name: Build and Export

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  EXPORT_NAME: Niemandsland

jobs:
  test:
    name: gdUnit4 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}

      - name: Import project (generates .godot/, compile-check)
        run: godot --headless --editor --quit --path . || true

      - name: Run gdUnit4 tests
        run: |
          godot --headless --path . \
            -s -d res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            --ignoreHeadlessMode -a res://test

  relay-tests:
    name: Relay tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install relay test deps
        run: pip install -r relay/requirements-dev.txt

      - name: Run relay tests (base + churn/soak)
        run: cd relay && python -m pytest -q

  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot (with export templates)
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}
          templates: "true"

      - name: Import project (generates .godot/)
        run: godot --headless --editor --quit --path . || true

      - name: Stamp build hash
        run: sed -i "/^config\/version=/a config/build_hash=\"${GITHUB_SHA::7}\"" project.godot

      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          godot --headless --verbose --export-release "Linux" build/linux/$EXPORT_NAME.x86_64

      # Best-effort: a failed artifact upload (e.g. the account's Actions artifact-storage
      # quota is full) must not red-fail the export job. Releases use the self-contained
      # release job below, not these artifacts.
      - name: Upload Linux Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux

  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot (with export templates)
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}
          templates: "true"

      - name: Import project (generates .godot/)
        run: godot --headless --editor --quit --path . || true

      - name: Stamp build hash
        run: sed -i "/^config\/version=/a config/build_hash=\"${GITHUB_SHA::7}\"" project.godot

      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          godot --headless --verbose --export-release "Windows Desktop" build/windows/$EXPORT_NAME.exe

      - name: Upload Windows Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows

  # Tag-gated: pushing a "v*" tag (e.g. v0.3.7-alpha) builds both platforms and
  # publishes them as a GitHub Release with permanent, public, direct download links.
  # Self-contained (builds its own binaries) so it does NOT depend on the best-effort
  # Actions artifact upload, which can hit the account's artifact storage quota.
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot (with export templates)
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}
          templates: "true"

      - name: Import project (generates .godot/)
        run: godot --headless --editor --quit --path . || true

      - name: Stamp build hash
        run: sed -i "/^config\/version=/a config/build_hash=\"${GITHUB_SHA::7}\"" project.godot

      # rcodesign (apple-codesign) ad-hoc-signs the macOS bundle on this Linux runner — no Apple
      # account, certificate, notarization or Mac runner needed. Pinned for reproducibility.
      - name: Install rcodesign (ad-hoc macOS signing)
        run: |
          RCODESIGN_URL="https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign/0.29.0/apple-codesign-0.29.0-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL -o /tmp/rcodesign.tar.gz "$RCODESIGN_URL"
          tar -xzf /tmp/rcodesign.tar.gz -C /tmp
          sudo mv /tmp/apple-codesign-*-x86_64-unknown-linux-musl/rcodesign /usr/local/bin/rcodesign
          rcodesign --version

      - name: Build Linux + Windows + macOS
        run: |
          mkdir -p dist/linux dist/windows dist/macos
          godot --headless --verbose --export-release "Linux" dist/linux/$EXPORT_NAME.x86_64
          godot --headless --verbose --export-release "Windows Desktop" dist/windows/$EXPORT_NAME.exe
          # macOS: export, then AD-HOC sign with rcodesign. An unsigned arm64 bundle is KILLED by
          # macOS on Apple Silicon ("is damaged"); an ad-hoc signature lets it run and downgrades
          # Gatekeeper to the milder "unidentified developer" prompt (right-click -> Open). Still
          # NOT notarized (no Apple account) — users may still need to clear quarantine once with
          # `xattr -dr com.apple.quarantine Niemandsland.app` (documented in the README).
          godot --headless --verbose --export-release "macOS" dist/macos/$EXPORT_NAME.zip
          unzip -q dist/macos/$EXPORT_NAME.zip -d dist/macos/bundle
          APP_BUNDLE=$(find dist/macos/bundle -maxdepth 1 -name '*.app' | head -1)
          rcodesign sign "$APP_BUNDLE"
          rm dist/macos/$EXPORT_NAME.zip
          (cd dist/macos/bundle && zip -qry "../$EXPORT_NAME.zip" .)

      - name: Package per-platform zips
        run: |
          (cd dist/linux && zip -r "../Niemandsland-${GITHUB_REF_NAME}-linux.zip" .)
          (cd dist/windows && zip -r "../Niemandsland-${GITHUB_REF_NAME}-windows.zip" .)
          # The macOS export is already a .zip of the .app bundle — just give it the release name.
          cp "dist/macos/${EXPORT_NAME}.zip" "dist/Niemandsland-${GITHUB_REF_NAME}-macos.zip"

      - name: Extract release notes (top CHANGELOG section)
        run: awk '/^## \[/{c++} c==1{print} c==2{exit}' CHANGELOG.md > release_notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Niemandsland ${{ github.ref_name }}
          body_path: release_notes.md
          prerelease: false
          files: |
            dist/Niemandsland-${{ github.ref_name }}-linux.zip
            dist/Niemandsland-${{ github.ref_name }}-windows.zip
            dist/Niemandsland-${{ github.ref_name }}-macos.zip

      # Auto-update channel: push the desktop builds to itch.io so players who installed through the
      # itch desktop app get automatic updates (butler does delta updates per channel). Runs AFTER the
      # GitHub Release so that always ships first; skips cleanly until itch is configured via two repo
      # secrets (Settings > Secrets and variables > Actions):
      #   BUTLER_API_KEY  — an itch API key from https://itch.io/user/settings/api-keys
      #   ITCH_TARGET     — "your-itch-username/your-game-slug" (the project's page URL slug)
      - name: Push to itch.io (if configured)
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_TARGET: ${{ secrets.ITCH_TARGET }}
        run: |
          if [ -z "$BUTLER_API_KEY" ] || [ -z "$ITCH_TARGET" ]; then
            echo "itch.io not configured (BUTLER_API_KEY / ITCH_TARGET secrets unset) — skipping."
            exit 0
          fi
          curl -sL -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip
          chmod +x butler
          VERSION="${GITHUB_REF_NAME#v}"
          ./butler push dist/linux   "$ITCH_TARGET:linux"   --userversion "$VERSION"
          ./butler push dist/windows "$ITCH_TARGET:windows" --userversion "$VERSION"
          # macOS: push the extracted .app bundle so the itch app launches it directly.
          unzip -q "dist/macos/${EXPORT_NAME}.zip" -d dist/macos-app
          ./butler push dist/macos-app "$ITCH_TARGET:mac" --userversion "$VERSION"
