name: Build and Export

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6
  EXPORT_NAME: Niemandsland

jobs:
  test:
    name: gdUnit4 Tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard — web renderer line present
        run: |
          grep -q 'renderer/rendering_method.web="gl_compatibility"' project.godot \
            || { echo "::error::project.godot lost renderer/rendering_method.web=\"gl_compatibility\" (required for the web/itch.io export)"; exit 1; }

      - name: Import project (generates .godot/, compile-check)
        run: godot --headless --editor --quit --path . || true

      - name: Run gdUnit4 tests
        run: |
          godot --headless --path . \
            -s -d res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            --ignoreHeadlessMode -a res://test

  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    needs: test
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Web Build
        run: |
          mkdir -v -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html

      # Best-effort: the export above is the real signal. A failed artifact upload (e.g. the
      # account's Actions artifact-storage quota is full) must not red-fail the export job.
      - name: Upload Web Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    needs: test
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          godot --headless --verbose --export-release "Linux" build/linux/$EXPORT_NAME.x86_64

      # Best-effort: the export above is the real signal. A failed artifact upload (e.g. the
      # account's Actions artifact-storage quota is full) must not red-fail the export job.
      - name: Upload Linux Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux

  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    needs: test
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          godot --headless --verbose --export-release "Windows Desktop" build/windows/$EXPORT_NAME.exe

      # Best-effort: the export above is the real signal. A failed artifact upload (e.g. the
      # account's Actions artifact-storage quota is full) must not red-fail the export job.
      - name: Upload Windows Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows
