name: Build and Export

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  EXPORT_NAME: Niemandsland

jobs:
  test:
    name: gdUnit4 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}

      - name: Import project (generates .godot/, compile-check)
        run: godot --headless --editor --quit --path . || true

      - name: Run gdUnit4 tests
        run: |
          godot --headless --path . \
            -s -d res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            --ignoreHeadlessMode -a res://test

  relay-tests:
    name: Relay tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install relay test deps
        run: pip install -r relay/requirements-dev.txt

      - name: Run relay tests (base + churn/soak)
        run: cd relay && python -m pytest -q

  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot (with export templates)
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}
          templates: "true"

      - name: Import project (generates .godot/)
        run: godot --headless --editor --quit --path . || true

      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          godot --headless --verbose --export-release "Linux" build/linux/$EXPORT_NAME.x86_64

      # Best-effort: the export above is the real signal. A failed artifact upload (e.g. the
      # account's Actions artifact-storage quota is full) must not red-fail the export job.
      - name: Upload Linux Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux

  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot (with export templates)
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}
          templates: "true"

      - name: Import project (generates .godot/)
        run: godot --headless --editor --quit --path . || true

      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          godot --headless --verbose --export-release "Windows Desktop" build/windows/$EXPORT_NAME.exe

      # Best-effort: the export above is the real signal. A failed artifact upload (e.g. the
      # account's Actions artifact-storage quota is full) must not red-fail the export job.
      - name: Upload Windows Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows
