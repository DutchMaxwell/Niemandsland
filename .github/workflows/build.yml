name: Build and Export

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  EXPORT_NAME: Niemandsland

jobs:
  test:
    name: gdUnit4 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}

      - name: Import project (generates .godot/, compile-check)
        run: godot --headless --editor --quit --path . || true

      - name: Run gdUnit4 tests
        run: |
          godot --headless --path . \
            -s -d res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            --ignoreHeadlessMode -a res://test

  relay-tests:
    name: Relay tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install relay test deps
        run: pip install -r relay/requirements-dev.txt

      - name: Run relay tests (base + churn/soak)
        run: cd relay && python -m pytest -q

  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot (with export templates)
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}
          templates: "true"

      - name: Import project (generates .godot/)
        run: godot --headless --editor --quit --path . || true

      - name: Stamp build hash
        run: sed -i "/^config\/version=/a config/build_hash=\"${GITHUB_SHA::7}\"" project.godot

      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          godot --headless --verbose --export-release "Linux" build/linux/$EXPORT_NAME.x86_64

      # Best-effort: a failed artifact upload (e.g. the account's Actions artifact-storage
      # quota is full) must not red-fail the export job. Releases use the self-contained
      # release job below, not these artifacts.
      - name: Upload Linux Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux

  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot (with export templates)
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}
          templates: "true"

      - name: Import project (generates .godot/)
        run: godot --headless --editor --quit --path . || true

      - name: Stamp build hash
        run: sed -i "/^config\/version=/a config/build_hash=\"${GITHUB_SHA::7}\"" project.godot

      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          godot --headless --verbose --export-release "Windows Desktop" build/windows/$EXPORT_NAME.exe

      - name: Upload Windows Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows

  # Tag-gated: pushing a "v*" tag (e.g. v0.3.6.0-alpha) builds both platforms and
  # publishes them as a GitHub Release with permanent, public, direct download links.
  # Self-contained (builds its own binaries) so it does NOT depend on the best-effort
  # Actions artifact upload, which can hit the account's artifact storage quota.
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot (with export templates)
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}
          templates: "true"

      - name: Import project (generates .godot/)
        run: godot --headless --editor --quit --path . || true

      - name: Stamp build hash
        run: sed -i "/^config\/version=/a config/build_hash=\"${GITHUB_SHA::7}\"" project.godot

      - name: Build Linux + Windows
        run: |
          mkdir -p dist/linux dist/windows
          godot --headless --verbose --export-release "Linux" dist/linux/$EXPORT_NAME.x86_64
          godot --headless --verbose --export-release "Windows Desktop" dist/windows/$EXPORT_NAME.exe

      - name: Package per-platform zips
        run: |
          (cd dist/linux && zip -r "../Niemandsland-${GITHUB_REF_NAME}-linux.zip" .)
          (cd dist/windows && zip -r "../Niemandsland-${GITHUB_REF_NAME}-windows.zip" .)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Niemandsland ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: |
            dist/Niemandsland-${{ github.ref_name }}-linux.zip
            dist/Niemandsland-${{ github.ref_name }}-windows.zip
