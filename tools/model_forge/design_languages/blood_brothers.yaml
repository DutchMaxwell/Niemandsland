# =============================================================================
# Blood Brothers - Design Language
# =============================================================================
# Vampirische Berserker-Supersoldaten in blutroter Power Armor.
# OPR-Aequivalent zu Blood Angels.
# Basiert auf: GF - Blood Brothers v3.5.2

faction_name: "Blood Brothers"

aesthetic:
  genre: "clean, bright, heroic sci-fi military — noble crimson armoured crusaders, crisp studio render"
  ip_strict: true   # power-armour humans: strict IP gate flags generic-marine / Chaos-drift lookalikes
  style: "sleek heavy original crimson power armour, polished, ornate and noble"
  inspiration:
    - "Futuristic heavy power-armour soldiers (generic sci-fi trope)"
    - "Augmented blood-red super-soldiers, fast and ferocious in close combat"
    - "Renaissance-knight and winged-angel silhouettes fused with original sci-fi technology"
  # NOTE: original_design_cues + weapon_style ARE now injected into the prompt (prompt_engine
  # _format_aesthetic) — keep them POSITIVE, never name a protected design here.
  original_design_cues:
    - "Smooth full-face visor helmet shaped like a stylised faceplate with a single horizontal glowing crimson slit"
    - "Sharp trapezoidal angular shoulder guards, flat and faceted, edged in gold"
    - "Original stylised teardrop-and-chalice crest emblem on the chest and one shoulder"
    - "Stylised feathered wing-shaped jump-pack vanes on the jump units, in gold and crimson"
    - "Segmented, layered angular crimson plate armour with polished gold filigree trim"
    - "Slightly stylised clean comic / video-game render (crisp readable shapes, bright even lighting)"
  weapon_style: "an original sleek angular bullpup heavy rifle with a slim profile and a glowing crimson power cell, paired with serrated close-combat blades"
  explicitly_avoid:
    - "Games Workshop / Warhammer 40,000 designs of any kind"
    - "Generic Space Marine look, big round pauldrons, Aquila / imperial double-eagle, purity-seal scrolls"
    - "Blood Angels trade dress, blood-drop chapter badge, jump-pack double-eagle"
    - "The terms ceramite, adamantium, bolter, Astartes, Terminator armour"
    - "Spikes, horns, daemonic ornament, exposed organic flesh or Chaos drift"
    - "Cartoon or anime proportions; sparkly vampire aesthetics"
    - "Any real-world military or franchise logos, insignia or trademarks"

colors:
  primary: "deep arterial red power armor"
  secondary: "burnished gold filigree and death masks"
  accent: "jet black weapon casings and jump pack housings"

materials:
  - "blood-red ceramite power armor with gold inlay"
  - "ornate death masks and angelic helmet crests"
  - "golden filigree on shoulder pads and chest plates"
  - "black leather weapon holsters and straps"

creature_type: "vampiric super-soldier in blood-red power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on armor surface textures (blood drops, angelic motifs, death masks)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

