# =============================================================================
# Jackals - Design Language
# =============================================================================
# Basiert auf: GF - Jackals v3.5.2
# Nomadische hundeaehnliche Aliens mit Schrotttechnologie und Reitbeasts.

faction_name: "Jackals"

aesthetic:
  genre: "grimdark sci-fi tribal"
  style: "nomadic scavenger aliens"
  inspiration:
    - "Humanoid canid aliens with jackal-like features and digitigrade legs"
    - "Post-apocalyptic nomadic scavengers using salvaged alien technology"
    - "Tribal hunter-gatherers thrust into the space age with jury-rigged gear"
    - "Tusken Raiders meets alien canid predators with scrap-tech weapons"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted character likenesses"
    - "Clean or advanced-looking technology"
    - "Cute or cartoon dog aesthetics"
    - "Human facial features"

colors:
  primary: "tawny brown and sandy fur with darker markings"
  secondary: "weathered rust-brown and gunmetal scrap metal"
  accent: "faded red and ochre tribal markings and cloth wrappings"

materials:
  - "short dense canid fur over lean muscular frame"
  - "salvaged scrap metal armor plates bolted and strapped together"
  - "tattered desert cloth wrappings and leather straps"
  - "bone and tooth trophies from hunted prey"
  - "crude jury-rigged alien technology with exposed wiring"

creature_type: "humanoid canid alien scavenger"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered creature, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on surface textures
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

