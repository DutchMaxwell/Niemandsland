# =============================================================================
# Plague Disciples - Design Language
# =============================================================================
# Basiert auf: GF - Plague Disciples v3.5.2
# Bloated chaos warriors devoted to the god of decay and disease.
# OPR-Aequivalent zu Death Guard.

faction_name: "Plague Disciples"

aesthetic:
  genre: "grimdark sci-fi pestilent chaos"
  style: "diseased decay warriors"
  inspiration:
    - "Bloated plague warriors in corroded power armor"
    - "Walking biohazard with noxious fumes and disease"
    - "Medieval plague doctor aesthetics meets corrupted military"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Death Guard iconography"
    - "Clean or healthy aesthetics"
    - "Cute or cartoonish decay"

colors:
  primary: "sickly pale green corroded power armor"
  secondary: "rusted brown and corroded bronze trim"
  accent: "putrid yellow-green noxious glow and slime"

materials:
  - "corroded and pitted ceramite with rust and verdigris"
  - "bloated organic growths bursting through armor gaps"
  - "noxious fume vents and plague censers"
  - "rusted chains and decayed cloth tabards"

creature_type: "bloated plague warrior in corroded power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - NO base, NO pedestal, NO platform, NO ground, NO stand, NO shadow on ground
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (corrosion, rust, organic growths, slime)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

