# =============================================================================
# Soul-Snatcher Cults - Design Language
# =============================================================================
# Basiert auf: GF - Soul-Snatcher Cults v3.5.2
# Parasitaere Alien-Organismen die menschliche Gesellschaften unterwandern.
# OPR-Aequivalent zu Genestealer Cults.
# Alien-Hybriden, gedankenkontrollierte Menschen, lauernder Horror,
# parasitaere Infizierung.

faction_name: "Soul-Snatcher Cults"

aesthetic:
  genre: "grimdark sci-fi horror"
  style: "parasitic infiltration cult"
  inspiration:
    - "Alien xenomorph-human hybrid horror"
    - "Underground doomsday cult aesthetics"
    - "Industrial mining colony workers corrupted by alien influence"
    - "Body horror mutations blending human and alien anatomy"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Genestealer Cult likenesses"
    - "Pure alien without human elements"
    - "Clean or heroic aesthetics"

colors:
  primary: "dirty industrial yellow and faded orange hazard suits"
  secondary: "bruised purple alien skin and chitin on mutated limbs"
  accent: "sickly pale flesh tones and glowing psychic teal eyes"

materials:
  - "worn mining overalls and industrial work gear"
  - "chitinous alien carapace on mutated limbs and heads"
  - "rusted industrial metal on improvised weapons and vehicles"
  - "pale sickly flesh blending into alien purple skin"

creature_type: "alien-human hybrid cult operative"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered creature, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on surface textures
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

