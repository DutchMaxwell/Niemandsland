# =============================================================================
# DAO Union - Design Language
# =============================================================================
# Basiert auf: GF - DAO Union v3.5.2
# Hochtechnologische Alien-Koalition mit Battlesuits, Drohnen und Railguns.
# OPR-Aequivalent zu Tau.

faction_name: "DAO Union"

aesthetic:
  genre: "grimdark sci-fi high-tech"
  style: "advanced alien coalition"
  inspiration:
    - "Blue-skinned aliens with clean advanced technology"
    - "Battlesuit mecha warriors with railgun technology"
    - "Japanese mecha anime meets alien civilization"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Tau Empire designs"
    - "Medieval or gothic aesthetics"
    - "Organic or biological technology"

colors:
  primary: "ochre tan and desert sand armor panels"
  secondary: "dark grey mechanical underlayer"
  accent: "orange-red sept markings and sensor lenses"

materials:
  - "smooth composite armor panels with clean lines"
  - "advanced sensor arrays and targeting systems"
  - "sleek energy weapon housings with blue glow"
  - "mechanical joint servos and thruster vents"

creature_type: "advanced alien warrior in high-tech armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (clean panels, sensor arrays, weapon systems)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

