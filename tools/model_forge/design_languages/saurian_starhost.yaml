# =============================================================================
# Saurian Starhost - Design Language
# =============================================================================
# Basiert auf: GF - Saurian Starhost v3.5.2
# Uralte Reptilien-Sternenkrieger mit Aztekischer Aesthetik, Froschmagier-Fuehrer
# und genetisch modifizierten Dinosaurier-Kriegsbestien.

faction_name: "Saurian Starhost"

aesthetic:
  genre: "grimdark sci-fi reptilian"
  style: "ancient reptilian star-warriors"
  inspiration:
    - "Aztec/Mesoamerican reptilian warriors with ancient technology"
    - "Dinosaur war-beasts armored for battle"
    - "Ancient alien lizard civilization with cosmic purpose"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Seraphon/Lizardmen designs"
    - "Mammalian features"
    - "Cute or cartoon dinosaurs"

colors:
  primary: "deep teal-blue scaled reptilian skin"
  secondary: "burnished gold Aztec ornaments and armor"
  accent: "bright turquoise cosmic energy and feather crests"

materials:
  - "thick reptilian scales and armored hide"
  - "gold Mesoamerican ornamental armor and headdresses"
  - "obsidian-like alien weaponry with energy cores"
  - "vibrant feather crests and ceremonial decorations"

creature_type: "ancient reptilian star-warrior"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - NO base, NO pedestal, NO platform, NO ground, NO stand, NO shadow on ground
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered creature, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on surface textures (scales, gold ornaments, feathers, cosmic energy)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

