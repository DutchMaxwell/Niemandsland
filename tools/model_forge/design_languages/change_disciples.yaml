# =============================================================================
# Change Disciples - Design Language
# =============================================================================
# Arkane Zauberer-Krieger in ornamentaler Power Armor, dem Gott des Wandels
# und der Magie verschrieben. Aegyptische und Vogel-Aesthetik, schwere Psyker.
# OPR-Aequivalent zu Thousand Sons.
# Basiert auf: GF - Change Disciples v3.5.2

faction_name: "Change Disciples"

aesthetic:
  genre: "grimdark sci-fi sorcerous chaos"
  style: "arcane sorcerer warriors"
  inspiration:
    - "Egyptian sorcerer-soldiers in ornate power armor"
    - "Avian and arcane motifs with psychic energy"
    - "Ancient mystical aesthetics fused with corrupted technology"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Thousand Sons iconography"
    - "Non-magical mundane warriors"
    - "Bright cheerful magic"

colors:
  primary: "deep sapphire blue power armor"
  secondary: "burnished gold trim and Egyptian-style engravings"
  accent: "eldritch pink and purple warpfire glow"

materials:
  - "ornate blue ceramite with golden hieroglyphic engravings"
  - "crystalline psychic conduits embedded in armor"
  - "flowing arcane energy tendrils around weapons"
  - "avian feather crests and bird-skull motifs"

creature_type: "sorcerous chaos in arcane power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (hieroglyphs, psychic glow, avian motifs)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

