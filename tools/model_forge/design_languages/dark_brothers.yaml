# =============================================================================
# Dark Brothers - Design Language
# =============================================================================
# Geheimnisvoller, monastischer Orden von Power-Armor-Kriegern mit dunklen
# Geheimnissen und Bussfertigkeits-Obsession.
# OPR-Aequivalent zu Dark Angels.
# Basiert auf: GF - Dark Brothers v3.5.2

faction_name: "Dark Brothers"

aesthetic:
  genre: "grimdark sci-fi monastic military"
  style: "secretive monastic knights"
  inspiration:
    - "Monastic knight order with dark secrets"
    - "Hooded warrior monks in power armor"
    - "Medieval Templar aesthetics fused with grimdark sci-fi"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Dark Angels iconography"
    - "Bright or cheerful color schemes"

colors:
  primary: "dark forest green power armor"
  secondary: "bone white robed inner circle"
  accent: "deep crimson weapon casings and wax seals"

materials:
  - "matte dark green ceramite power armor"
  - "monastic hooded robes over armor"
  - "brass-bound plasma weapons with green glow"
  - "ancient parchment scrolls and devotional chains"

creature_type: "secretive warrior monk in dark power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (robes, plasma glow, chapter markings)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

