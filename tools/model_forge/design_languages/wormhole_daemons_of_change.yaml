# =============================================================================
# Wormhole Daemons of Change - Design Language
# =============================================================================
# Reine Daemonen des Wandels und der Magie - vogelartige Entitaeten, Flamers
# aus Warpfeuer, Lords of Change. OPR-Aequivalent zu Tzeentch-Daemonen.
# Uebernatuerliche Wesen, KEINE Power Armor, avian/arkane Aesthetik.
# Basiert auf: GF - Wormhole Daemons of Change v3.5.2

faction_name: "Wormhole Daemons of Change"

aesthetic:
  genre: "dark fantasy horror"
  style: "arcane avian daemons"
  inspiration:
    - "Avian sorcerous daemons wreathed in warpfire"
    - "Shifting iridescent beings of pure magic"
    - "Lovecraftian cosmic horror meets bird-like entities"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Tzeentch daemon designs"
    - "Power armor or military equipment"
    - "Cute or friendly magical beings"

colors:
  primary: "iridescent blue-pink shifting warpflame"
  secondary: "deep sapphire blue daemon flesh"
  accent: "bright yellow-gold arcane eyes and runes"

materials:
  - "shimmering iridescent daemon flesh"
  - "crystalline arcane formations and warp-crystal growths"
  - "ethereal warpfire tendrils and flame patterns"
  - "feathered wings with eye-patterned plumage"

creature_type: "arcane avian warp daemon"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered creature, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on surface textures (iridescent flesh, warpfire, feathers, arcane runes)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

