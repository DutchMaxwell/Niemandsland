# =============================================================================
# Knight Brothers - Design Language
# =============================================================================
# Psychische Krieger-Ritter in Silberrstung, Elite-Daemonjaeger mit Kraftwaffen.
# OPR-Aequivalent zu Grey Knights.
# Basiert auf: GF - Knight Brothers v3.5.2

faction_name: "Knight Brothers"

aesthetic:
  genre: "grimdark sci-fi psychic military"
  style: "psychic knight templar"
  inspiration:
    - "Psychic knight templars in silver power armor"
    - "Daemon-hunting paladins with force weapons"
    - "Inquisitorial elite strike force"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Grey Knights iconography"
    - "Non-psychic mundane aesthetics"

colors:
  primary: "polished silver power armor"
  secondary: "deep blue force weapon glow and cloth"
  accent: "gold psychic inscriptions and ward runes"

materials:
  - "polished silver ceramite with psychic ward engravings"
  - "glowing blue force weapons and psychic conduits"
  - "golden runic inscriptions across armor plates"
  - "deep blue tabards with arcane sigils"

creature_type: "psychic warrior knight in silver power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - NO base, NO pedestal, NO platform, NO ground, NO stand, NO shadow on ground
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (psychic runes, force weapon glow, silver polish)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

