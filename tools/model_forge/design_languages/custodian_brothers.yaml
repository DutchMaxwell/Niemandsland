# =============================================================================
# Custodian Brothers - Design Language
# =============================================================================
# Ultra-elite goldene Super-Soldaten, persoenliche Wache des Conduit.
# OPR-Aequivalent zu Custodes. Wenige Modelle, extrem elite.

faction_name: "Custodian Brothers"

aesthetic:
  genre: "grimdark sci-fi palatial military"
  style: "ultra-elite golden warriors"
  inspiration:
    - "Ancient Roman Praetorian Guard in futuristic golden power armor"
    - "Spartan elite warriors with ornate ceremonial weapons"
    - "Byzantine imperial bodyguard aesthetics"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Custodes iconography"
    - "Plain or unadorned armor"
    - "Mass-produced military aesthetics"

colors:
  primary: "polished auric gold power armor"
  secondary: "deep crimson red cloth and plumes"
  accent: "sapphire blue gemstones and lenses"

materials:
  - "master-crafted auramite golden armor plating"
  - "ornate filigree and engravings on every surface"
  - "flowing crimson cloaks and tabards"
  - "gemstone-encrusted weapon hafts"

creature_type: "elite golden super-warrior in masterwork power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on ornate armor textures (gold filigree, gemstones, engravings)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

