# =============================================================================
# Goblin Reclaimers - Design Language
# =============================================================================
# Basiert auf: GF - Goblin Reclaimers v3.5.2
# Scavenging goblin-like aliens who build ramshackle technology from salvage.
# Emerged from underground after a nuclear blast wiped out human colonists,
# now spreading across the stars seeking their lost human friends and new gadgets.
# OPR-Aequivalent zu Gretchin/Grot-Fraktionen - scrappy, resourceful, swarm tactics.

faction_name: "Goblin Reclaimers"

aesthetic:
  genre: "grimdark sci-fi comedy"
  style: "ramshackle scavenger horde"
  inspiration:
    - "Junkyard scavenger goblins with cobbled-together technology"
    - "Post-apocalyptic scrapyard aesthetics with oversized salvaged weapons"
    - "Scrappy diminutive aliens wielding absurdly large improvised guns"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Gretchin or Grot likenesses"
    - "Clean or polished technology"
    - "Cute or cartoon chibi proportions"
    - "Standard fantasy goblin tropes (no pointy hats, no medieval)"

colors:
  primary: "dirty olive green skin with yellowish undertones"
  secondary: "rusted orange-brown scrap metal armor and weapons"
  accent: "hazard yellow warning stripes and glowing radioactive green energy"

materials:
  - "rough leathery green alien skin"
  - "corroded riveted scrap metal plates and junk armor"
  - "frayed wire, duct tape, and improvised welding joints"
  - "oily rags, leather straps, and salvaged fabric"

creature_type: "diminutive goblin alien scavenger"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered creature, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on surface textures (scrap metal, green skin, junk armor)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

