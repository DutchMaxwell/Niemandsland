# =============================================================================
# Lust Disciples - Design Language
# =============================================================================
# Chaos-Krieger des Gottes der Exzesse und Geschwindigkeit.
# Perfektionsbesessenheit, Sonic-Waffen, ueberwaetigende Sinnesreize.
# OPR-Aequivalent zu Emperor's Children.
# Basiert auf: GF - Lust Disciples v3.5.2

faction_name: "Lust Disciples"

aesthetic:
  genre: "grimdark sci-fi hedonistic chaos"
  style: "perfection-obsessed fallen warriors"
  inspiration:
    - "Fallen warriors pursuing perfection through excess"
    - "Elegant corrupted armor with sonic weapons"
    - "Decadent aesthetics mixed with speed and grace"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Emperor's Children iconography"
    - "Overly sexual or gratuitous designs"
    - "Plain or utilitarian aesthetics"

colors:
  primary: "rich purple and pink power armor"
  secondary: "burnished gold filigree and excess motifs"
  accent: "electric neon pink sonic energy glow"

materials:
  - "iridescent purple ceramite with gold excess symbols"
  - "sonic amplifiers and speaker-weapon arrays"
  - "flowing silk capes and decadent decorations"
  - "mirror-polished surfaces and gem-encrusted weapons"

creature_type: "perfection-obsessed fallen warrior in ornate power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (iridescent surfaces, sonic weapons, excess motifs)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

