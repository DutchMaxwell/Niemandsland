# =============================================================================
# Blessed Sisters - Design Language
# =============================================================================
# Religioeser weiblicher Militaerorden in Power Armor - Warrior Nuns im Weltraum.
# OPR-Aequivalent zu Sisters of Battle.
# Basiert auf: GF - Blessed Sisters v3.5.2

faction_name: "Blessed Sisters"

aesthetic:
  genre: "grimdark sci-fi religious military"
  style: "militant religious order"
  inspiration:
    - "Warrior nuns in futuristic power armor"
    - "Gothic cathedral architecture fused with military technology"
    - "Joan of Arc meets sci-fi crusade"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Adepta Sororitas iconography"
    - "Sexualized or impractical armor"
    - "Cartoon aesthetics"

colors:
  primary: "jet black power armor"
  secondary: "ivory white cloth robes and tabards"
  accent: "deep crimson holy seals and relics"

materials:
  - "polished ceramite power armor with gothic tracery"
  - "devotional cloth robes and prayer scrolls"
  - "golden religious iconography and reliquaries"
  - "stained glass effect on helmet lenses"

creature_type: "devout warrior sister in ornate power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (gothic tracery, devotional script, battle damage)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

