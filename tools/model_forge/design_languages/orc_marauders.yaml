# =============================================================================
# Orc Marauders - Design Language
# =============================================================================
# Basiert auf: GF - Orc Marauders v3.5.2
# Brutale gruenhautige Aliens mit primitiver Schrott-Technologie.

faction_name: "Orc Marauders"

aesthetic:
  # Greenskin marauders are a generic savage-alien trope (NOT a 1:1 elite power-armour
  # range), so ip_strict stays off and the lenient gate applies. Weapons are MANUFACTURED
  # scrap-tech (choppas, shotguns, MGs, flamers) — bio_weapons stays off (default). The
  # army fields trucks, buggies, walkers and planes, so all_creatures stays off too.
  genre: "bright, crisp, high-contrast sci-fi — savage scrap-tech raiders rendered as a clean studio sculpt"
  style: "brutal green-skinned marauders in bolted-together scrap armour"
  inspiration:
    - "Brutal green-skinned aliens with crude scrap technology"
    - "Savage tribal warriors with ramshackle vehicles"
    - "Post-apocalyptic desert-raider barbarian horde with cobbled-together machines"
  # NOTE: original_design_cues + weapon_style ARE injected into the prompt (humanoid units
  # only) — keep them POSITIVE and ORIGINAL; never name a protected design or real IP here.
  original_design_cues:
    - "Heavy hunched silhouette with a thick neck, broad sloping shoulders and an oversized jutting under-bite jaw"
    - "Riveted scrap-plate armour bolted in mismatched panels, with a flat angular shoulder guard on one side"
    - "Original geometric clan emblem: a bold yellow-and-black hazard chevron scratched onto a metal plate"
    - "Crude leather straps, trophy bones and exposed welded seams across the armour"
    - "Bright green skin with scars and rough hand-daubed war paint, sharp readable shapes under even studio light"
  weapon_style: "crude oversized scrap-metal weapons hand-welded from salvaged parts — chunky barrels, jagged cleaver-blades and visible bolts and rivets, fully mechanical and machine-built hard metal"
  explicitly_avoid:
    - "Clean or refined high-tech finishes"
    - "Cute or cartoon orcs"
    - "Any real-world military or franchise logos, insignia or trademarks"
    - "Spindly elegant proportions; sleek streamlined armour"

colors:
  primary: "dark green orc skin"
  secondary: "rusty red and dirty orange scrap metal"
  accent: "yellow-black hazard stripes and crude war paint"

materials:
  - "thick green alien skin with scars and tattoos"
  - "rusty scrap metal armor plates bolted together"
  - "crude leather straps and trophy bones"
  - "smoke-belching ramshackle mechanical parts"

creature_type: "brutal green-skinned orc warrior"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered creature, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on surface textures (green skin, scrap metal, crude weapons)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

