# =============================================================================
# Machine Cult - Design Language
# =============================================================================
# Basiert auf: GF - Machine Cult v3.5.2
# Tech-Priester und Cyborg-Krieger, die Technologie verehren.
# Robentragende Cyborgs mit mechanischen Augmentierungen, Arc-Waffen und
# wandelnden Kriegsmaschinen.

faction_name: "Machine Cult"

aesthetic:
  genre: "grimdark sci-fi cybernetic"
  style: "tech-priest cyborg warriors"
  inspiration:
    - "Hooded cyborg tech-priests with mechanical augmentations"
    - "Industrial steampunk-gothic machinery worship"
    - "Da Vinci mechanical designs meets grimdark cybernetics"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Adeptus Mechanicus iconography"
    - "Clean or sleek high-tech aesthetics"
    - "Fully organic or unaugmented humans"

colors:
  primary: "dark crimson red robes and cloaks"
  secondary: "tarnished bronze and copper mechanical parts"
  accent: "pale green arc energy and optic lenses"

materials:
  - "heavy red tech-priest robes over mechanical bodies"
  - "tarnished bronze and copper cybernetic augmentations"
  - "crackling arc weapon coils and tesla nodes"
  - "exposed gears, pistons and data-cables"

creature_type: "cyborg tech-priest warrior"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on surface textures (mechanical parts, robes, arc energy, cables)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

