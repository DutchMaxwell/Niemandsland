# =============================================================================
# Wormhole Daemons of Lust - Design Language
# =============================================================================
# Daemonen der Lust: elegante, schlanke, raubtierhaft schnelle Warp-Daemonen
# mit Krabben-Klauen und ueberirdischer Anmut. Alien-elegant, nicht sexuell.
# OPR-Aequivalent zu Slaanesh Daemons.
# Basiert auf: GF - Wormhole Daemons of Lust v3.5.2

faction_name: "Wormhole Daemons of Lust"

aesthetic:
  genre: "dark fantasy horror"
  style: "elegant predatory daemons"
  inspiration:
    - "Lithe predatory daemons of alien elegance"
    - "Sinuous fast-moving entities with crab-like claws"
    - "Dark fae court aesthetics meets alien horror"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Slaanesh daemon designs"
    - "Sexualized or gratuitous designs"
    - "Power armor or military equipment"

colors:
  primary: "pale lavender daemon flesh"
  secondary: "deep purple and magenta shadows"
  accent: "electric pink energy claws and eyes"

materials:
  - "smooth pale daemon skin with iridescent sheen"
  - "chitinous crab-like claw appendages"
  - "flowing ethereal hair and mane tendrils"
  - "sharp obsidian-like horn and claw formations"

creature_type: "elegant predatory warp daemon"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered creature, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on surface textures (smooth skin, claws, ethereal energy)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

