# =============================================================================
# Watch Brothers - Design Language
# =============================================================================
# Veteranen-Xenojaeger-Spezialisten in schwarzer Power Armor mit silberner
# linker Schulterplatte. Jeder Krieger stammt aus einem anderen Detachment.
# OPR-Aequivalent zu Deathwatch.
# Basiert auf: GF - Watch Brothers v3.5.2

faction_name: "Watch Brothers"

aesthetic:
  genre: "grimdark sci-fi military"
  style: "veteran xenos-hunter specialists"
  inspiration:
    - "Elite alien-hunting special operations soldiers"
    - "Black-armored veterans from diverse backgrounds"
    - "Special forces kill-team with specialized anti-xenos weapons"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Deathwatch iconography"
    - "Uniform identical models"

colors:
  primary: "jet black power armor"
  secondary: "polished silver left shoulder pad"
  accent: "crimson red weapon casings and chapter markings"

materials:
  - "matte black ceramite power armor"
  - "polished silver veteran shoulder guard"
  - "specialized xenos-hunting ammunition pouches"
  - "red optic lenses and targeting arrays"

creature_type: "veteran xenos-hunter specialist in black power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (kill markings, specialist equipment, mixed weapon systems)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

