# =============================================================================
# Human Inquisition - Design Language
# =============================================================================
# Geheime Hexenjaeger und Daemonentoeter mit diversen Warbands.
# OPR-Aequivalent zu Inquisition/Agents of the Imperium.
# Basiert auf: GF - Human Inquisition v3.5.2

faction_name: "Human Inquisition"

aesthetic:
  genre: "grimdark sci-fi gothic"
  style: "secretive inquisitorial agents"
  inspiration:
    - "Gothic witch-hunter inquisitors with diverse retinues"
    - "Secret agents and assassins in a dark sci-fi setting"
    - "Spanish Inquisition meets sci-fi covert operations"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Inquisition iconography"
    - "Uniform military aesthetics"
    - "Bright or cheerful colors"

colors:
  primary: "dark black and deep red robes and armor"
  secondary: "burnished gold Inquisitorial rosettes and seals"
  accent: "stark white skull motifs and purity scrolls"

materials:
  - "heavy leather greatcoats and armored robes"
  - "ornate gold inquisitorial badges and relics"
  - "exotic weapons from across the galaxy"
  - "parchment scrolls and wax seals"

creature_type: "secretive inquisitorial agent"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on surface textures (leather, gold insignia, exotic weapons, scrolls)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

