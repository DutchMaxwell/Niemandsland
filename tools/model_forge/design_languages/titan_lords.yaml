# =============================================================================
# Titan Lords - Design Language
# =============================================================================
# Massive bipedale Kriegsmaschinen, gesteuert von gelangweilten Adeligen.
# OPR-Aequivalent zu Imperial Knights. Riesige Walker-Mechs mit schweren
# Waffen, Adelsheraldik und Reaktorkern-Energiefeldern.
# Basiert auf: GF - Titan Lords v3.5.2

faction_name: "Titan Lords"

aesthetic:
  genre: "grimdark sci-fi mecha"
  style: "noble house war machines"
  inspiration:
    - "Massive bipedal war machines piloted by noble knights"
    - "Medieval heraldry on giant walking battle mechs"
    - "Feudal noble house aesthetics on towering war engines"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Imperial Knight designs"
    - "Anime mecha proportions"
    - "Small infantry-scale figures"

colors:
  primary: "dark blue and silver metallic armor plating"
  secondary: "gold and red noble house heraldry"
  accent: "glowing blue reactor vents and weapon barrels"

materials:
  - "thick adamantine armor plating with battle damage"
  - "noble house heraldic banners and shields"
  - "massive weapon arm mountings with energy conduits"
  - "hydraulic leg pistons and reactor exhaust vents"

creature_type: "massive bipedal war machine"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered war machine, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on armor surface textures (heraldry, battle damage, mechanical details)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

