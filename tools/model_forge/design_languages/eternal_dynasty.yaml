# =============================================================================
# Eternal Dynasty - Design Language
# =============================================================================
# Basiert auf: GF - Eternal Dynasty v3.5.2
# Fortgeschrittene Alien-Zivilisation mit Clan-Kriegern, Drohnen, ONI-Kampfanzuegen
# und Titanen. Japanisch-inspirierte Sci-Fi-Aesthetik.

faction_name: "Eternal Dynasty"

aesthetic:
  genre: "grimdark sci-fi elegant alien"
  style: "ancient psychic alien warriors"
  inspiration:
    - "Ancient graceful alien civilization with psychic technology"
    - "Sleek organic-tech armor with flowing lines"
    - "Art nouveau meets alien warrior culture"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Eldar/Aeldari iconography"
    - "Bulky or heavy aesthetics"
    - "Human military designs"

colors:
  primary: "bone white wraithbone armor"
  secondary: "deep blue spirit stone accents"
  accent: "bright green psychic energy glow"

materials:
  - "smooth wraithbone organic-tech armor"
  - "glowing spirit stones embedded in armor"
  - "flowing silk-like fabric and plumes"
  - "crystalline psychic weapon housings"

creature_type: "ancient psychic alien warrior"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - NO base, NO pedestal, NO platform, NO ground, NO stand, NO shadow on ground
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on surface textures (wraithbone, spirit stones, psychic energy)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

