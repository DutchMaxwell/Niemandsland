# =============================================================================
# Ratmen Clans - Design Language
# =============================================================================
# Basiert auf: GF - Ratmen Clans v3.5.2
# Scheming rat-like aliens with unstable warpstone technology and swarm tactics.
# OPR equivalent of Skaven in space. Cowardly, numerous, insane mad-science weapons.

faction_name: "Ratmen Clans"

aesthetic:
  genre: "grimdark sci-fi vermin"
  style: "scheming rat-alien swarm"
  inspiration:
    - "Rat-like aliens with unstable warpstone-powered technology"
    - "Scheming vermin swarms with insane mad-science weapons"
    - "Medieval plague rat aesthetics meets chaotic sci-fi tech"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Skaven designs"
    - "Cute or friendly rodent aesthetics"
    - "Clean or reliable technology"

colors:
  primary: "mangy brown-grey fur and dirty cloth wrappings"
  secondary: "corroded green-tinged warpstone metal"
  accent: "sickly green warpstone energy glow"

materials:
  - "matted filthy fur over hunched bodies"
  - "corroded warpstone-infused metal components"
  - "dirty cloth wrappings and scavenged armor bits"
  - "crackling unstable warpstone energy conduits"

creature_type: "scheming rat-alien warrior"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - NO base, NO pedestal, NO platform, NO ground, NO stand, NO shadow on ground
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered creature, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on surface textures (fur, corroded metal, warpstone glow)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

