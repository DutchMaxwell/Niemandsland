# =============================================================================
# Dark Elf Raiders - Design Language
# =============================================================================
# Sadistische Piraten-Raider einer dunklen Alien-Zivilisation.
# OPR-Aequivalent zu Drukhari/Dark Eldar.
# Basiert auf: GF - Dark Elf Raiders v3.5.2

faction_name: "Dark Elf Raiders"

aesthetic:
  genre: "grimdark sci-fi dark elf"
  style: "sadistic pirate raiders"
  inspiration:
    - "Sadistic alien pirates in spiked dark armor"
    - "Gladiatorial pain-obsessed raiders with poison weapons"
    - "Dark elf aesthetics meets sci-fi raider culture"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Drukhari/Dark Eldar designs"
    - "Bright or cheerful aesthetics"
    - "Bulky heavy armor"

colors:
  primary: "deep midnight purple and black armor"
  secondary: "dark teal green poison-coated blades"
  accent: "acid green poison vials and eye lenses"

materials:
  - "sleek dark armor with razor-sharp spikes"
  - "poison-coated serrated blades and splinter weapons"
  - "dark leather and chain mesh undersuit"
  - "trophy racks of captured souls and pain tokens"

creature_type: "sadistic dark elf raider"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on surface textures (spikes, poison, dark armor, blades)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

