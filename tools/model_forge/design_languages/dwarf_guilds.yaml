# =============================================================================
# Dwarf Guilds - Design Language
# =============================================================================
# Basiert auf: GF - Dwarf Guilds v3.5.2
# Stocky space dwarves - schwer gepanzerte Krieger mit fortschrittlicher
# Ingenieurskunst, Bikes, Gyrokoptern und schweren Waffen.
# OPR-Aequivalent zu Leagues of Votann/Squats.

faction_name: "Dwarf Guilds"

aesthetic:
  genre: "clean, bright, crisp industrial sci-fi — burnished forge-engineers in a clear studio render"
  style: "space dwarf engineers and warriors"
  inspiration:
    - "Stocky space dwarves with advanced industrial technology"
    - "Norse dwarf forge aesthetics meets sci-fi engineering"
    - "Heavy-armored miners and engineers in a war setting"
  # NOTE: original_design_cues + weapon_style ARE now injected into the prompt (prompt_engine
  # _format_aesthetic) — keep them POSITIVE, never name a protected design here.
  original_design_cues:
    - "Very stocky, broad-shouldered low-set proportions — wide and compact, never tall or slender"
    - "Heavy enclosed forge-helm with a single broad horizontal amber visor band and a riveted cheek guard"
    - "Thick slab-sided armour plates with chunky rivets, bevelled edges and a riveted gorget over a braided beard"
    - "Original cog-and-anvil guild crest stamped on one shoulder plate and the chest"
    - "Burnished orange-brown plate over dark steel-grey mechanical underframe with bright amber energy cells"
    - "Bright, even studio lighting and crisp readable industrial surfaces — no grime, no gloom"
  weapon_style: "chunky bevelled industrial firearms and heavy forged hammers, picks and axes with riveted casings and amber power cells"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Leagues of Votann designs"
    - "Tall or slender proportions"
    - "Organic or alien technology"

colors:
  primary: "burnished orange-brown industrial armor"
  secondary: "dark steel grey mechanical components"
  accent: "bright amber energy cells and visor lenses"

materials:
  - "thick industrial armor plating with mining guild insignia"
  - "heavy mechanical exo-frames and servo-assists"
  - "braided beards with metal clasps and rune-tags"
  - "heat-resistant forge aprons and protective gear"

creature_type: "stocky space dwarf warrior in heavy industrial armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on surface textures (industrial armor, beards, mechanical parts)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

