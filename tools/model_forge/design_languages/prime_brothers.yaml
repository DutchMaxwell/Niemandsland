# =============================================================================
# Prime Brothers - Design Language
# =============================================================================
# Next-Generation Super-Soldaten in stromlinienfoermiger Advanced Power Armor.
# Original, generic next-generation power-armour super-soldiers for Niemandsland. The GENRE
# (armoured sci-fi infantry) is a common trope and free to use; specific commercial trade dress
# is NOT — these designs are our own work, released CC-BY-SA 4.0. Keep them clearly original.
# Basiert auf: GF - Prime Brothers v3.5.2

faction_name: "Prime Brothers"

aesthetic:
  genre: "clean, bright, crisp sci-fi military — next-generation armoured super-soldiers, sleek studio render"
  ip_strict: true   # next-gen power-armour humans: strict IP gate flags generic-marine / Chaos-drift lookalikes
  style: "advanced next-generation power armor, sleek streamlined and noble"
  inspiration:
    - "Next-generation super-soldiers in streamlined power armor"
    - "Modern military special forces meets sci-fi technology"
    - "Clean angular power armor with advanced tech integration"
  # NOTE: original_design_cues + weapon_style ARE injected into the prompt (prompt_engine
  # _format_aesthetic / generate_prompt) for humanoid units — keep them POSITIVE, never name a
  # protected design here (naming an IP anchors the model toward it).
  original_design_cues:
    - "Smooth tall full-face visor helmet with a narrow vertical glowing blue eye-slit and a single short central crest fin"
    - "Streamlined sloped pentagonal shoulder guards, slim and faceted (not big round drums)"
    - "Original interlocking-arrows ring emblem on the chest and one shoulder"
    - "Sleek segmented next-gen plate armour with clean smooth polished surfaces and crisp panel lines"
    - "Clean, bright and noble look — no spikes, horns, skulls or daemonic ornament"
    - "Palette: deep cobalt-blue armour with bright gold trim, a white helmet stripe and glowing blue optics"
  weapon_style: "an original sleek angular slim-profile precision rifle with a long fluted barrel and a glowing blue energy cell"
  explicitly_avoid:
    - "Games Workshop / Warhammer 40,000 designs of any kind"
    - "Space Marine or Primaris Marine look, big round pauldrons"
    - "Aquila / imperial double-eagle, purity-seal skulls, iron-halo skull motifs"
    - "Boxy magazine-fed bolter-style rifles"
    - "The terms ceramite, adamantium, bolter, Astartes, Primaris, Terminator armour"
    - "Any real-world military or franchise logos, insignia or trademarks"
    - "Bulky or antiquated armor designs; cartoon or anime proportions; xenos or alien features"

colors:
  primary: "deep cobalt-blue power armor"
  secondary: "bright gold trim and an original geometric order insignia"
  accent: "white helmet stripe and wax oath-seals"

materials:
  - "advanced mark X power armor plating"
  - "reinforced joint servos with enhanced mobility"
  - "tactical pouches and ammunition feeds"
  - "glowing blue optic lenses"

creature_type: "next-generation super-soldier in advanced power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on armor surface textures (panel lines, advanced tech details)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

