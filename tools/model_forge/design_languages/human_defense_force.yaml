# =============================================================================
# Human Defense Force - Design Language
# =============================================================================
# Regulaere menschliche Militaermacht - massive Armeen regulaerer Soldaten mit
# Panzern, Artillerie und Luftunterstuetzung.
# OPR-Aequivalent zu Astra Militarum / Imperial Guard.
# Basiert auf: GF - Human Defense Force v3.5.2

faction_name: "Human Defense Force"

aesthetic:
  genre: "grimdark sci-fi military"
  style: "utilitarian mass infantry army"
  inspiration:
    - "WW1/WW2 infantry aesthetic in a sci-fi setting"
    - "Massive conscript armies with heavy armor support"
    - "Pragmatic utilitarian military with mass-produced equipment"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Imperial Guard regiment designs"
    - "Super-soldier or power armor aesthetics"
    - "Alien technology"

colors:
  primary: "olive drab and khaki uniform fatigues"
  secondary: "dark steel grey vehicle armor"
  accent: "regimental red insignia and gold officer trim"

materials:
  - "canvas and flak armor vest over fatigues"
  - "heavy riveted steel tank armor"
  - "leather belts, pouches and webbing"
  - "matte painted military equipment"

creature_type: "regular human soldier in flak armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on surface textures (fabric fatigues, flak armor, military equipment)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

