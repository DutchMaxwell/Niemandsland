# =============================================================================
# Robot Legions - Design Language
# =============================================================================
# Basiert auf: GF - Robot Legions v3.5.2
# Uralte Roboterkrieger, die aus aeonenaltem Schlummer erwachen.
# Skelettartige Metallroboter mit Gauss-Waffen, gruener Energie, Selbstreparatur.

faction_name: "Robot Legions"

aesthetic:
  genre: "grimdark sci-fi"
  style: "ancient skeletal robots"
  inspiration:
    - "Ancient skeletal robots awakening from aeons of dormancy"
    - "Egyptian tomb aesthetics fused with advanced robotics"
    - "Terminator-like relentless machines with alien technology"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Necron iconography"
    - "Organic or biological elements"
    - "Cartoon robot aesthetics"

colors:
  primary: "dark metallic silver and gunmetal chassis"
  secondary: "dark obsidian black armor plates"
  accent: "sickly green gauss energy glow"

materials:
  - "ancient metallic endoskeleton with self-repair nanites"
  - "obsidian-black armor plating over silver chassis"
  - "glowing green gauss energy conduits"
  - "crystalline green power cores and eye sockets"

creature_type: "ancient robotic warrior"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on surface textures (metallic chassis, gauss glow, ancient engravings)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

