# =============================================================================
# Infected Colonies - Design Language
# =============================================================================
# Basiert auf: GF - Infected Colonies v3.5.2
# Menschliche Kolonien, infiziert durch mysterioese Parasiten, die eine eigene
# Intelligenz entwickeln. Die Infektion verwandelt Menschen in mutierte
# Krieger und erschafft groteske Bestien aus einst vertrauten Tieren.
# Die Parasiten breiteten sich ueber menschliche Handelsrouten aus und
# fragmentierten in verschiedene Staemme mit unterschiedlichen Philosophien.
# OPR-Aequivalent zu Tyranid-infizierte Genestealer / Parasite-Horror.

faction_name: "Infected Colonies"

aesthetic:
  # Organic parasite-horror horde: weapons are LIVING grown organs (bio_weapons).
  # NOT a power-armour humanoid range, so no strict IP gate. Has vehicles + an
  # aircraft, so NOT all_creatures.
  bio_weapons: true     # weapons rendered as living grown weapon-organs (organic faction)
  genre: "clean, bright, crisp sci-fi creature-horror — vivid readable parasite mutations, crisp studio render"
  style: "parasitic infection and mutation, clean tabletop wargaming studio sculpt"
  # NOTE: genre/style/inspiration ARE injected into the prompt — keep them positive and
  # original; no real franchise or commercial-IP names here.
  inspiration:
    - "humanoid colonists overtaken and reshaped by a colonial parasite organism"
    - "fungal-chitin growths bursting through the host's skin and torn clothing"
    - "grotesque mutated beasts grown from once-familiar colony animals"
  # Original design cues + signature weapon ARE injected (for humanoid units only).
  # Keep them positive and original — never name a protected design.
  original_design_cues:
    - "Hunched asymmetric silhouette: a human frame warped by overlapping parasitic plates and one over-grown limb"
    - "Head fused with a ridged fungal crest and glowing spore-vents where the face is consumed"
    - "Hard parasitic carapace plates erupting through split skin, ringed with pulsing spore sacs"
    - "Tattered remnants of colonial work clothing and webbing hanging off the mutated body"
    - "An original three-spore-cluster sigil marking the host where the parasite took root"
    - "Palette: pale necrotic flesh, exposed bone-white, with toxic purple-red and bioluminescent growths"
  weapon_style: "living grown bio-weapons — bone-blade claws, fused spore-launcher organs and ichor-coated barbs sprouting from the limbs"
  explicitly_avoid:
    - "Clean or healthy human appearance"
    - "Cute or cartoonish mutations"
    - "Pure alien without human remnants visible"
    - "Any real-world or franchise logos, insignia or trademarks"

colors:
  primary: "diseased flesh tones with grey-green necrotic patches"
  secondary: "exposed bone white and yellowed cartilage"
  accent: "toxic purple-red parasitic growths and bioluminescent spore sacs"

materials:
  - "mutated human flesh stretched and split by parasitic growths"
  - "chitinous parasitic armor plates erupting through skin"
  - "pulsing fungal-organic spore sacs and tendrils"
  - "remnants of tattered colonial clothing and military gear"

creature_type: "parasite-infected mutant colonist"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered creature, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on surface textures
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

