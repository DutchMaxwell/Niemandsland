# =============================================================================
# Wolf Brothers - Design Language
# =============================================================================
# Verwilderte wikinger-thematische Super-Soldaten mit Wolfbegleitern.
# OPR-Aequivalent zu Space Wolves.
# Basiert auf: GF - Wolf Brothers v3.5.2

faction_name: "Wolf Brothers"

aesthetic:
  genre: "grimdark sci-fi feral military"
  style: "viking berserker power armor"
  inspiration:
    - "Viking berserkers in futuristic power armor"
    - "Wolf-themed tribal warriors with advanced technology"
    - "Norse mythology meets sci-fi military"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Space Wolves iconography"
    - "Clean or disciplined military aesthetics"
    - "Cartoon wolf designs"

colors:
  primary: "storm grey power armor"
  secondary: "tanned leather and brown fur pelts"
  accent: "ice blue runic glow and wolf eye lenses"

materials:
  - "weathered grey ceramite power armor"
  - "wolf pelts and fur cloaks draped over armor"
  - "carved runic inscriptions on armor plates"
  - "bone and fang talismans and trophy racks"

creature_type: "feral wolf-warrior in runic power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (runes, pelts, fang trophies, weathering)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

