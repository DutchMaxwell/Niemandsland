# =============================================================================
# Battle Brothers - Design Language
# =============================================================================
# Original, generic heavy-power-armour super-soldiers for Niemandsland. The GENRE
# (armoured sci-fi infantry) is a common trope and free to use; the SPECIFIC
# Games Workshop / Warhammer 40,000 trade dress is NOT. These designs are our own
# work and are released CC-BY-SA 4.0 — keep them clearly original.

faction_name: "Battle Brothers"

# Style anchor fed to Nano Banana (reference_image_path) so every unit shares the approved
# render look + design. See references/battle_brothers/ (01_hero_FINAL.png is the approved look).
hero_reference: "references/battle_brothers/00_style_reference.png"

aesthetic:
  genre: "grimdark sci-fi military"
  style: "heavy original power armour"
  inspiration:
    - "Futuristic heavy power-armour soldiers (generic sci-fi trope)"
    - "Augmented super-soldiers"
    - "Medieval knight-crusader silhouettes fused with original sci-fi technology"
  original_design_cues:
    - "Smooth full-face visor helmet with a single horizontal glowing teal slit (not a skull or beak shape)"
    - "Sharp TRAPEZOIDAL angular shoulder guards — NOT big round Space-Marine pauldrons"
    - "Original chevron-and-hexagon crest emblem on the chest and shoulder"
    - "Segmented, layered angular plate armour"
    - "Slightly stylised, clean comic / video-game render look (crisp readable shapes, not photoreal grime)"
  weapon_style: "an original sleek angular bullpup heavy rifle with a slim profile and a glowing teal power cell — clearly NOT a boxy magazine-fed bolter"
  explicitly_avoid:
    - "Games Workshop / Warhammer 40,000 designs of any kind"
    - "Space Marine look, blue-and-gold Ultramarine colours, big round pauldrons"
    - "Aquila / imperial double-eagle, purity seals, iron halo, skull motifs"
    - "Boxy magazine-fed bolter-style rifles"
    - "The terms ceramite, adamantium, bolter, Astartes, Terminator armour"
    - "Any real-world military or franchise logos, insignia or trademarks"
    - "Cartoon-baby or anime proportions; xenos or alien features"

colors:
  primary: "dark slate-grey power armour"
  secondary: "copper-bronze trim and an original angular crest emblem"
  accent: "deep maroon cloth tabards, engraved honour plaques, and glowing teal optics"

materials:
  - "heavy polymer-ceramic composite armour plating"
  - "reinforced alloy joints and servo-mechanisms"
  - "leather and cloth tabards"
  - "glowing optic lenses on helmets"

creature_type: "genetically enhanced super-soldier in heavy power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (panel lines, rivets, scratches)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  # NOTE: the `explicitly_avoid` list is intentionally NOT injected here. Naming GW terms
  # (even to "avoid" them) anchors them in text-to-image models and produced the aquila +
  # Primaris helmet. Describe the original design positively instead (see unit_details).

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

