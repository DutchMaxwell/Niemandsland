# =============================================================================
# Battle Brothers - Design Language
# =============================================================================
# Genetisch modifizierte Elite-Soldaten in schwerer Power Armor.
# OPR-Aequivalent zu Space Marines.
# Basiert auf: GF - Battle Brothers v3.5.2

faction_name: "Battle Brothers"

aesthetic:
  genre: "grimdark sci-fi military"
  style: "militaristic power armor"
  inspiration:
    - "Futuristic heavy power armor soldiers"
    - "Clone army super-soldiers"
    - "Medieval knight crusader aesthetics fused with sci-fi technology"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Space Marine chapter iconography"
    - "Cartoon or anime proportions"
    - "Xenos or alien features"

colors:
  primary: "dark gunmetal blue power armor"
  secondary: "burnished gold trim and aquila insignia"
  accent: "deep red cloth tabards and purity seals"

materials:
  - "heavy ceramite power armor plating"
  - "reinforced adamantine joints and servo-mechanisms"
  - "leather and cloth tabards"
  - "glowing optic lenses on helmets"

creature_type: "genetically enhanced super-soldier in heavy power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - NO base, NO pedestal, NO platform, NO ground, NO stand, NO shadow on ground
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (panel lines, rivets, scratches)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

