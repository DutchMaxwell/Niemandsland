# =============================================================================
# High Elf Fleets - Design Language
# =============================================================================
# Basiert auf: GF - High Elf Fleets v3.5.2
# Nomadische Weltraumelfen mit hochspezialisierten Aspektkriegern,
# Elementargeistern und eleganter Anti-Gravitations-Technologie.
# Original Niemandsland species (CC-BY-SA) — graceful star-faring elf-kin with
# crystal armour and anti-gravity tech. Deliberately our own design, not any
# specific commercial range.

faction_name: "High Elf Fleets"

aesthetic:
  # Clean, bright, crisp studio render — no grimdark / dark / muddy wording.
  genre: "clean, bright, elegant sci-fi fantasy — graceful crystalline star-elves, crisp studio render"
  style: "sleek graceful nomadic fleet warriors, polished and luminous"
  inspiration:
    - "Ancient nomadic star-faring elf-kin civilization with refined psychic mastery"
    - "Highly specialized warriors, each perfecting a single discipline of war"
    - "Sleek anti-gravity technology and smooth pale crystal-ceramic constructs"
    - "Elegant flowing curves fused with advanced crystalline technology"
  # NOTE: original_design_cues + weapon_style ARE injected into the prompt
  # (prompt_engine _format_aesthetic) for humanoid units — keep them POSITIVE,
  # ORIGINAL and free of any protected design name.
  original_design_cues:
    - "Tall, slender, graceful humanoid silhouette with a high upright posture"
    - "Smooth tall conical crested helmet with a long sweeping plume and a single narrow vertical glowing visor slit"
    - "Sleek segmented pale crystal-ceramic armour plates with gently flowing curved edges (no bulk, no spikes, no horns)"
    - "Original teardrop-and-triple-crescent emblem on the chest plate and one shoulder"
    - "Small luminous faceted gemstone nodes set into the chest, helmet and shoulders"
    - "Bright noble palette: bone-white and pale ice-blue plates with gold trim and bright gemstone accents"
  weapon_style: "an original slim crystalline rifle with a long tapered barrel, a faceted glowing power-gem core, and an elegant curved stock"
  explicitly_avoid:
    - "Any specific commercial miniatures range or franchise designs"
    - "Bulky, heavy or industrial aesthetics; spikes, horns, skulls or daemonic ornament"
    - "Human proportions or crude human technology"
    - "Cartoon or anime aesthetics"
    - "Dark, grim, muddy or low-contrast rendering"
    - "Any real-world military or franchise logos, insignia or trademarks"

colors:
  primary: "bone white and pale ice-blue armor panels"
  secondary: "gold trim and deep sapphire blue accent plates"
  accent: "glowing crystal nodes in red and green, bright faceted gemstone nodes"

materials:
  - "smooth pale crystal-ceramic armor with gently flowing curved edges"
  - "psycho-reactive faceted gemstone nodes embedded in armor"
  - "shimmering gossamer cloaks and silk pennants"
  - "translucent energy fields and holographic projections"
  - "polished pale alloy with gentle luminescence"

creature_type: "graceful alien fleet warrior"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on surface textures (smooth alien armor, gemstones, flowing cloth)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

