# =============================================================================
# War Disciples - Design Language
# =============================================================================
# Blutbesessene Chaos-Berserker in blutroter Ruestung mit Schaedeln und Ketten.
# OPR-Aequivalent zu World Eaters/Khorne Berzerkers.
# Basiert auf: GF - War Disciples v3.5.2

faction_name: "War Disciples"

aesthetic:
  genre: "grimdark sci-fi berserker chaos"
  style: "blood-mad melee berserkers"
  inspiration:
    - "Blood-crazed berserker warriors in spiked power armor"
    - "Skull-obsessed rage warriors with chain weapons"
    - "Viking berserker rage meets corrupted sci-fi military"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted World Eaters or Khorne iconography"
    - "Calm or disciplined aesthetics"
    - "Ranged-focused or shooty designs"

colors:
  primary: "blood red and dark brass power armor"
  secondary: "dark bronze trim and skull decorations"
  accent: "fresh blood splatter and gore effects"

materials:
  - "blood-stained ceramite with brass skull decorations"
  - "chain weapons with roaring teeth"
  - "skull trophy racks and bone decorations"
  - "blood-soaked leather straps and chains"

creature_type: "blood-mad berserker warrior in blood-stained power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on armor surface textures (blood, skulls, chain weapons, brass trim)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

