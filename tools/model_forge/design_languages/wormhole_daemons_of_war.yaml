# =============================================================================
# Wormhole Daemons of War - Design Language
# =============================================================================
# Blutdaemons des Krieges: rothaeutige, muskuloese Daemons mit Messingwaffen,
# besessen von Blut, Schaedeln und purem Gemetzel.
# OPR-Aequivalent zu Khorne Daemons.
# Basiert auf: GF - Wormhole Daemons of War v3.5.2

faction_name: "Wormhole Daemons of War"

aesthetic:
  genre: "dark fantasy horror"
  style: "blood-crazed war daemons"
  inspiration:
    - "Muscular red-skinned daemons wielding hellforged weapons"
    - "Skull-obsessed rage entities of pure war"
    - "Classical depictions of war demons meets dark fantasy"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Khorne daemon designs"
    - "Calm or peaceful aesthetics"
    - "Power armor or military equipment"

colors:
  primary: "deep crimson red daemon flesh"
  secondary: "dark brass and bronze armor plates"
  accent: "black obsidian horns and hellfire orange eyes"

materials:
  - "muscular crimson daemon skin with ritual scars"
  - "brass and bronze hellforged armor fragments"
  - "obsidian-like horn and bone formations"
  - "blood-stained hellforged weapons"

creature_type: "blood-crazed war daemon"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered creature, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on surface textures (daemon skin, brass weapons, skulls, blood)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

