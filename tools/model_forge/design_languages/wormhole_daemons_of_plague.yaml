# =============================================================================
# Wormhole Daemons of Plague - Design Language
# =============================================================================
# Basiert auf: GF - Wormhole Daemons of Plague v3.5.2
# Bloated rotting daemons of decay, disease, and entropy.
# Original Niemandsland decay-daemon faction (generic plague-daemon trope).
# Grotesque jolly plague beings with exposed organs, flies, slime, and disease.

faction_name: "Wormhole Daemons of Plague"

aesthetic:
  all_creatures: true   # pure daemon/creature swarm — no vehicles, aircraft, walkers or titans
  bio_weapons: true     # organic daemon faction: weapons read as grown plague-organs, fused maws and corroded daemon arms (only for organic factions)
  genre: "clean, bright, crisp creature-feature studio render — readable and high-contrast, vivid colourful fantasy sculpt"
  style: "rotund jolly plague daemons, crisp readable sculpt with bright vivid colour"
  # Original Niemandsland daemons — deliberately distinct from any specific commercial plague-daemon range.
  inspiration:
    - "Rotund, jovial bloated decay-daemons with a friendly grotesque grin"
    - "Vivid colourful plague beings (bright lime, coral, sunflower) rather than grim brown sludge"
    - "Medieval bestiary plague imagery reimagined as a bright, clean creature sculpt"
  # Internal documentation only (NOT injected for creatures): what makes these clearly our own daemons.
  original_design_cues:
    - "Head: a round, jolly, single-horned bald head with a wide friendly toothy grin and milky eyes (not a snarling tusked maw)"
    - "Body: a perfectly spherical pot belly split into a smiling vertical seam, framed by short stubby limbs"
    - "Emblem: an original triple-ring spiral 'rot-rune' brand seared into the flesh of one shoulder"
    - "Palette: bright lime-green flesh + coral-pink seams + sunflower-yellow drips (clean and saturated, not muddy)"
    - "Adornment: tiny brass plague-bells on simple cord, no spikes, horns-cluster or skull-piles"
  weapon_style: "a corroded brass plague-hammer or pitted bane-blade grown over with bright fungal nodules, plus body-fused spitter-maws for ranged daemons"
  explicitly_avoid:
    - "Any specific commercial plague-daemon miniatures range trade dress"
    - "Copyrighted decay-god daemon designs of any kind"
    - "Dark, muddy, brown, low-contrast or gloomy grimdark look"
    - "Power armor or military hard-tech equipment"
    - "Grim brown sludge palette; keep colours bright and saturated"

colors:
  primary: "sickly pale green daemon flesh"
  secondary: "exposed pink-red organs and intestines"
  accent: "putrid yellow pus and slime drips"

materials:
  - "bloated rotting daemon flesh with open sores"
  - "exposed organs and intestinal loops"
  - "dripping slime and pus formations"
  - "rusted corroded daemon weapons and plague bells"

creature_type: "bloated plague warp daemon"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered creature, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on surface textures (rotting flesh, slime, rust, disease)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

