# =============================================================================
# Elven Jesters - Design Language
# =============================================================================
# Basiert auf: GF - Elven Jesters v3.5.2
# Toedliche Performer-Krieger in Diamantmuster-Kostuemen mit Masken,
# Akrobatik und theatralischen Waffen. Soeldner und Unterhalter.
# OPR-Aequivalent zu Harlequins.

faction_name: "Elven Jesters"

aesthetic:
  genre: "grimdark sci-fi theatrical"
  style: "deadly performer-warriors"
  inspiration:
    - "Deadly masked acrobat-warriors in diamond-patterned costumes"
    - "Commedia dell'arte performers as alien killers"
    - "Cirque du Soleil meets alien assassin troupe"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Harlequin designs"
    - "Silly or non-threatening clown aesthetics"
    - "Heavy armor or bulky designs"

colors:
  primary: "diamond-pattern black and white costume"
  secondary: "rich purple and teal accent panels"
  accent: "bright gold mask details and weapon edges"

materials:
  - "tight-fitting diamond-patterned bodysuit"
  - "ornate theatrical masks with alien features"
  - "holographic shimmer-weave fabric"
  - "crystalline alien performance weapons"

creature_type: "masked alien performer-warrior"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on surface textures (diamond patterns, masks, holographic shimmer)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

