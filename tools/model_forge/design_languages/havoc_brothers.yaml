# =============================================================================
# Havoc Brothers - Design Language
# =============================================================================
# Chaos-korrumpierte Super-Soldaten in verdorbener Power Armor.
# OPR-Aequivalent zu Chaos Space Marines.
# Basiert auf: GF - Havoc Brothers v3.5.2

faction_name: "Havoc Brothers"

aesthetic:
  genre: "grimdark sci-fi chaos"
  style: "corrupted fallen warriors"
  inspiration:
    - "Fallen super-soldiers corrupted by dark powers"
    - "Spiky twisted power armor with daemon iconography"
    - "Gothic horror fused with corrupted military technology"
  explicitly_avoid:
    - "Games Workshop specific designs"
    - "Copyrighted Chaos Space Marine iconography"
    - "Clean or loyalist aesthetics"
    - "Cartoon evil"

colors:
  primary: "dark iron and tarnished black power armor"
  secondary: "brass trim and daemon-faced shoulder pads"
  accent: "sickly warpfire green glow from mutations"

materials:
  - "corroded ceramite power armor with chaos mutations"
  - "brass spikes and daemon iconography"
  - "flayed skin trophies and chain decorations"
  - "glowing warp-tainted weapon runes"

creature_type: "chaos-corrupted fallen warrior in twisted power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - NO base, NO pedestal, NO platform, NO ground, NO stand, NO shadow on ground
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Consistent dramatic lighting from upper left
  - High detail on armor surface textures (corruption, spikes, mutations, daemon icons)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}
  - Explicitly avoid: {explicitly_avoid}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

