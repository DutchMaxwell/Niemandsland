# =============================================================================
# Havoc Brothers - Design Language
# =============================================================================
# Original renegade/corrupted heavy-power-armour super-soldiers for Niemandsland.
# The GENRE (armoured renegade sci-fi infantry) is a common trope and free to use;
# any specific commercial trade dress is NOT. These designs are our own work and are
# released CC-BY-SA 4.0 — keep them clearly original (ip_strict gate is ON).
# Basiert auf: GF - Havoc Brothers v3.5.2

faction_name: "Havoc Brothers"

aesthetic:
  genre: "clean, bright, crisp sci-fi — menacing fallen warband warriors, sharp readable studio render"
  ip_strict: true   # corrupted power-armour humans: strict IP gate flags generic-marine / commercial-range lookalikes
  style: "sleek heavy original corrupted power armour, ominous but crisply sculpted"
  inspiration:
    - "Futuristic heavy power-armour soldiers turned renegade (generic sci-fi trope)"
    - "Augmented super-soldiers warped by a corrupting influence"
    - "Sinister knight-renegade silhouettes fused with original sci-fi technology"
  # NOTE: original_design_cues + weapon_style ARE injected into the prompt (prompt_engine
  # _format_aesthetic) — keep them POSITIVE and original; never name a protected design here.
  original_design_cues:
    - "Asymmetric full-face helmet with a snarling fanged faceplate and a single jagged glowing acid-green eye slit"
    - "One enlarged, sharply faceted angular shoulder guard ringed with short backswept blades"
    - "Original eight-bladed broken-wheel emblem etched into the chest plate"
    - "Heavy segmented plate armour with a battered, pitted dark-iron finish and exposed brass joint seams"
    - "Asymmetric trophy chains and ragged hanging tatters breaking up the silhouette"
    - "Sinister but crisp, readable comic / video-game render with bright even lighting (no muddy gloom)"
  weapon_style: "an original heavy blocky rifle with a brass-banded barrel and a glowing acid-green ammo coil, paired with a brutal serrated power-cleaver"
  explicitly_avoid:
    - "Games Workshop / Warhammer 40,000 designs of any kind"
    - "Chaos Space Marine look, eight-pointed star, big round pauldrons"
    - "Aquila / imperial double-eagle, purity seals, skull-heap motifs"
    - "Boxy magazine-fed bolter-style rifles"
    - "The terms ceramite, adamantium, bolter, Astartes, Terminator armour, Chaos"
    - "Any real-world military or franchise logos, insignia or trademarks"
    - "Literal demon/organic flesh growths on the armour itself; cartoon evil"

colors:
  primary: "clean gunmetal and dark-iron power armour with crisp bright highlights"
  secondary: "polished brass trim and an original eight-bladed broken-wheel emblem"
  accent: "bright acid-green glowing optics and weapon coils, deep oxblood-red cloth tatters"

materials:
  - "heavy battered polymer-ceramic composite armour plating with a pitted dark-iron finish"
  - "polished brass joint seams and short backswept blades"
  - "trophy chains and ragged hanging cloth tatters"
  - "glowing acid-green energy coils and optic lenses"

creature_type: "renegade super-soldier in heavy corrupted power armor"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on armor surface textures (corruption, spikes, mutations, daemon icons)
  - 28mm tabletop miniature aesthetic and heroic proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

