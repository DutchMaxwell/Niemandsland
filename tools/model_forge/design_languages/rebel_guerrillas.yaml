# =============================================================================
# Rebel Guerrillas - Design Language
# =============================================================================
# Basiert auf: GF - Rebel Guerrillas v3.5.2
# Untergrund-Kultisten und Mutanten-Rebellen mit umgebauter Bergbauausruestung.
# OPR-Aequivalent zu Genestealer Cults.

faction_name: "Rebel Guerrillas"

aesthetic:
  genre: "clean, bright, crisp sci-fi insurgency — gritty industrial rebels rendered as a crisp readable studio sculpt"
  style: "mining-cult insurgents in improvised gear, clean tabletop wargaming studio render"
  inspiration:
    - "Underground mining-cult rebels with improvised, jury-rigged weapons"
    - "Industrial workers turned guerrilla fighters in stolen military kit"
    - "Insurgents whose ragtag look mixes hard-hats, work coveralls and patched flak armour"
  # NOTE: original_design_cues + weapon_style ARE injected into the prompt (prompt_engine
  # _format_aesthetic only injects genre/style/inspiration; generate_prompt injects these
  # two for humanoid units). Keep them POSITIVE and ORIGINAL — never name a protected design.
  original_design_cues:
    - "Mismatched salvaged headgear — a battered mining hard-hat with a headlamp or a patched military helmet, never a uniform matching helmet"
    - "Layered improvised armour: a stolen flak vest strapped over grubby work coveralls, with extra plates, pouches and bandoliers bolted and taped on"
    - "An original triangular wedge-and-three-bars insurgent emblem scratched or stencilled onto a shoulder plate"
    - "Asymmetric, individual, hand-made silhouette — each fighter clearly cobbled their own kit together, knee-pads and rolled sleeves"
    - "Dirty industrial yellow-and-grey palette with rust streaks and rebel spray-paint markings"
    - "Subtle off-human heritage on some fighters: faint purple-tinged skin patches and slightly angular features, kept understated"
  weapon_style: "improvised insurgent firearms built from converted mining tools — carbines and pistols welded from rock-drill and mining-laser parts, blocky and hand-machined, plus brutal melee picks and powered drills"
  explicitly_avoid:
    - "Clean uniform military aesthetics or matched regulation kit"
    - "Obviously alien appearance for basic troops"
    - "Any real-world military or franchise logos, insignia or trademarks"
    - "Spiky, horned, daemonic or organic-growth ornament"

colors:
  primary: "dirty industrial yellow and grey work coveralls"
  secondary: "rusted metal mining equipment and tools"
  accent: "purple alien-tainted skin patches and eyes"

materials:
  - "dirty industrial coveralls and mining gear"
  - "converted mining lasers and rock drills"
  - "stolen military flak vests and helmets"
  - "alien-tainted flesh with subtle mutations"

creature_type: "rebel guerrilla fighter in industrial gear"

prompt_template: |
  {unit_name}, {creature_type} miniature for tabletop wargaming.

  CRITICAL REQUIREMENTS:
  - Just the figure itself as a clean isolated cut-out, full body with both feet fully modelled and visible and only empty space beneath the feet
  - Pose as described in SPECIFIC DETAILS section
  - Clean silhouette against pure white background (#FFFFFF)
  - Single centered figure, full body visible
  - Isometric 3/4 view angle (optimal for 3D reconstruction)
  - Bright, even, diffuse studio lighting from the front — soft flat product-shot light that keeps the seamless pure-white floor clean right up to the boot soles
  - High detail on surface textures (industrial coveralls, mining gear, mutations)
  - 28mm tabletop miniature aesthetic and proportions

  STYLE:
  - {aesthetic}
  - Color palette: {colors}
  - Materials: {materials}

  SPECIFIC DETAILS:
  {unit_details}

  OUTPUT:
  - Square aspect ratio 1:1
  - Clean edges, no artifacts
  - Professional miniature photography style

