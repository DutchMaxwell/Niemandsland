<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ faction }} — R2 Models</title>
<script type="module" src="/static/model-viewer.min.js"></script>
<style>
  :root { --bg:#0e1014; --panel:#171a21; --line:#262b36; --txt:#e7ebf2; --dim:#8b94a6;
          --cyan:#39c1ff; --amber:#ffb13b; --red:#ff5466; --green:#3ad07a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:15px/1.5 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif; }
  header { padding:18px 28px; border-bottom:1px solid var(--line); display:flex;
           align-items:center; gap:16px; flex-wrap:wrap; position:sticky; top:0;
           background:var(--bg); z-index:5; }
  h1 { font-size:19px; margin:0; }
  a.back { color:var(--cyan); text-decoration:none; font-size:14px; }
  .pill { background:var(--panel); border:1px solid var(--line); border-radius:999px;
          padding:3px 11px; font-size:13px; color:var(--dim); }
  #filter { margin-left:auto; background:var(--panel); border:1px solid var(--line); color:var(--txt);
            border-radius:8px; padding:8px 12px; font-size:14px; width:220px; }
  .wrap { max-width:1280px; margin:0 auto; padding:22px 28px; }
  .gaps { color:var(--amber); font-size:13px; margin:0 0 20px; border-left:3px solid var(--amber);
          padding:8px 14px; background:rgba(255,177,59,.06); border-radius:0 6px 6px 0; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden;
          display:flex; flex-direction:column; transition:opacity .25s; }
  .card.gone { opacity:.25; pointer-events:none; }
  .media { position:relative; aspect-ratio:1; background:#0a0c10; }
  .media img { width:100%; height:100%; object-fit:contain; display:block; }
  .media model-viewer { width:100%; height:100%; --poster-color:transparent; background:#0a0c10; }
  .no2d { display:flex; align-items:center; justify-content:center; height:100%; color:var(--dim);
          font-size:13px; }
  .body { padding:11px 13px; display:flex; flex-direction:column; gap:7px; }
  .name { font-weight:600; font-size:14.5px; line-height:1.25; }
  .meta { color:var(--dim); font-size:11.5px; font-variant-numeric:tabular-nums; display:flex;
          gap:8px; flex-wrap:wrap; }
  .meta a { color:var(--dim); }
  .row { display:flex; gap:8px; margin-top:2px; }
  button { font:inherit; font-size:13px; border-radius:8px; padding:7px 10px; cursor:pointer;
           border:1px solid var(--line); background:#1d222c; color:var(--txt); flex:1; }
  button:hover { border-color:var(--cyan); }
  button.del { color:var(--red); }
  button.del:hover { border-color:var(--red); background:rgba(255,84,102,.1); }
  #toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:#1d222c;
           border:1px solid var(--line); border-radius:10px; padding:11px 18px; font-size:14px;
           opacity:0; transition:opacity .25s; pointer-events:none; }
  #toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <a class="back" href="/">← Übersicht</a>
  <h1>{{ faction }}</h1>
  <span class="pill" id="count">{{ on_r2 }} auf R2</span>
  <input id="filter" placeholder="Units filtern…" oninput="filterUnits(this.value)">
</header>
<div class="wrap">
  {% if gaps %}
  <p class="gaps"><b>{{ gaps|length }} Roster-Lücke(n)</b> (nicht auf R2): {{ gaps|join(' · ') }}</p>
  {% endif %}
  <div class="grid" id="grid">
    {% for u in units %}
    <div class="card" data-unit="{{ u.unit }}" data-name="{{ u.unit|lower }}">
      <div class="media">
        {% if u.has_2d %}
          <img loading="lazy" src="/2d/{{ faction }}/{{ u.unit|urlencode }}" alt="{{ u.unit }}">
        {% else %}
          <div class="no2d">keine 2D-Quelle</div>
        {% endif %}
      </div>
      <div class="body">
        <div class="name">{{ u.unit }}</div>
        <div class="meta">
          <span>{{ u.size_mb }} MB</span><span>{{ u.sha }}</span>
          <a href="{{ u.public_url }}" target="_blank" rel="noopener">R2 ↗</a>
        </div>
        <div class="row">
          <button onclick="show3d(this)">🔍 3D</button>
          <button class="del" onclick="del(this)">🗑 Löschen</button>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
<div id="toast"></div>
<script>
  const FACTION = {{ faction|tojson }};
  function filterUnits(q){
    q = q.trim().toLowerCase();
    document.querySelectorAll('#grid .card').forEach(c => {
      c.style.display = c.dataset.name.includes(q) ? '' : 'none';
    });
  }
  function show3d(btn){
    const card = btn.closest('.card');
    const unit = card.dataset.unit;
    const media = card.querySelector('.media');
    media.innerHTML = '<model-viewer camera-controls auto-rotate touch-action="pan-y" ' +
      'shadow-intensity="1" exposure="1.1" environment-image="neutral" ' +
      'src="/glb/' + encodeURIComponent(FACTION) + '/' + encodeURIComponent(unit) + '"></model-viewer>';
    btn.disabled = true; btn.textContent = '3D ↑';
  }
  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 3200);
  }
  async function del(btn){
    const card = btn.closest('.card');
    const unit = card.dataset.unit;
    if(!confirm('Modell "' + unit + '" wirklich von R2 löschen?\n\n' +
       'Entfernt das R2-Objekt + den Manifest-Eintrag. Danach den Agenten bitten, das Manifest zu committen.')) return;
    btn.disabled = true; btn.textContent = '…';
    try{
      const r = await fetch('/api/delete', {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({faction:FACTION, unit:unit})});
      const j = await r.json();
      if(!j.ok){ toast('Fehler: ' + (j.error||'unbekannt')); btn.disabled=false; btn.textContent='🗑 Löschen'; return; }
      card.classList.add('gone');
      const c = document.getElementById('count');
      c.textContent = j.remaining_faction !== undefined ? c.textContent : (parseInt(c.textContent)-1) + ' auf R2';
      toast('Gelöscht "' + unit + '"' + (j.deleted_from_r2 ? ' (R2 + Manifest)' : ' (nur Manifest — Hash geteilt)') +
            '. ' + j.remaining + ' Modelle gesamt.');
    }catch(e){ toast('Fehler: ' + e); btn.disabled=false; btn.textContent='🗑 Löschen'; }
  }
</script>
</body>
</html>
