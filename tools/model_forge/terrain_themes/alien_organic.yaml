theme_name: "Alien Organic"
theme_key: "alien_organic"

aesthetic:
  genre: "sci-fi horror"
  style: "alien bioorganic landscape"
  inspiration:
    - "HR Giger biomechanical"
    - "Alien movie xenomorph hive"
    - "Deep sea bioluminescent creatures"
  explicitly_avoid:
    - "Human architecture"
    - "Mechanical or industrial elements"
    - "Earth-like vegetation"

colors:
  primary: "dark purple chitinous surface"
  secondary: "bone white and pale ivory"
  accent: "toxic green bioluminescent veins"

materials:
  - "chitinous organic shell"
  - "translucent membrane tissue"
  - "ribbed bone-like structures"
  - "glistening mucous coating"

# =============================================================================
# BATTLE MAP
# =============================================================================

battle_map:
  prompt: |
    Flat uniform ground surface texture, top-down aerial view for tabletop wargaming battle mat.
    Smooth chitinous organic surface with faint bioluminescent vein patterns. Alien hive floor.
    Subtle natural variation, consistent dark purple tone across entire surface.
    NO scattered objects, NO debris, NO rocks, NO vegetation.
    NO miniatures, NO terrain pieces, NO text, NO shadows.
    Surface details must be VERY SMALL and fine-grained, as if viewed from far above.
    Individual features (vein patterns, pores, ridges) should be no larger than 1% of the image.
    Flat diffuse lighting, printed gaming mat look.
    Landscape 3:2 aspect ratio (72x48 inches table). Resolution 4096x2732.

# =============================================================================
# BASE PLATES
# =============================================================================

base_plates:
  ruins:
    prompt: |
      Seamless tileable top-down texture, cracked chitinous organic floor
      with exposed ribbed bone structures. Broken membrane fragments.
      Dark purple with bone white. 512x512, no shadows, flat lighting.
  forest:
    prompt: |
      Seamless tileable top-down texture, alien organic ground with mycelium
      network visible, small fungal growths, spore clusters, creep carpet.
      Dark purple with bioluminescent green veins. 512x512, no shadows, flat lighting.
  dangerous:
    prompt: |
      Seamless tileable top-down texture, bubbling alien acid pool surface
      with dissolved fragments, caustic residue patterns, organic rim.
      Toxic green with dark purple edges. 512x512, no shadows, flat lighting.

# =============================================================================
# WALLS
# =============================================================================

walls:
  - key: "chitin_wall_3inch"
    name: "Chitin Hive Wall (3\")"
    length_inches: 3
    height_inches: 3
    variants: 3
    prompt: |
      Alien chitinous hive wall segment, 3 inches long, 3 inches tall, 28mm scale.
      Ribbed organic shell with membrane windows, bioluminescent veins pulsing.
      Dark purple chitin, bone white ridges. Sci-fi horror bioorganic.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat chitinous wall surface texture, front view.
      Ribbed organic shell with membrane windows, bioluminescent veins pulsing.
      Dark purple chitin, bone white ridges. Sci-fi horror bioorganic.
      512x512, flat lighting, no shadows, no perspective, no ground.

  - key: "chitin_wall_1inch"
    name: "Chitin Hive Wall (1\")"
    length_inches: 1
    height_inches: 3
    variants: 3
    prompt: |
      Short alien chitinous wall segment, 1 inch long, 3 inches tall, 28mm scale.
      Ribbed organic shell, translucent membrane patch, growth nodules.
      Dark purple chitin. Sci-fi horror bioorganic.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat chitinous wall surface texture, front view.
      Ribbed organic shell, translucent membrane patch, growth nodules.
      Dark purple chitin. Sci-fi horror bioorganic.
      512x512, flat lighting, no shadows, no perspective, no ground.

  - key: "bone_ridge"
    name: "Bone Ridge Barrier (3\")"
    length_inches: 3
    height_inches: 1.5
    variants: 3
    prompt: |
      Low alien bone ridge barrier, 3 inches long, 1.5 inches tall, 28mm scale.
      Fused bone-like structures forming natural barricade, sharp protrusions.
      Bone white and pale ivory with mucous coating. Sci-fi horror.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat bone surface texture, front view.
      Fused bone-like structures with sharp protrusions and mucous coating.
      Bone white and pale ivory. Sci-fi horror bioorganic.
      512x512, flat lighting, no shadows, no perspective, no ground.

# =============================================================================
# TREES
# =============================================================================

trees:
  - key: "giant_mushroom"
    name: "Giant Alien Mushroom"
    prompt: |
      Single giant alien mushroom, tabletop wargaming terrain, 28mm scale.
      Wide cap with bioluminescent spots on underside, thick spongy stalk.
      Dark purple cap, bone white stalk, toxic green glow. Sci-fi horror.
      CRITICAL: NO base, NO ground plane. White background. Height approx 3.5 inches.

  - key: "tendril_spire"
    name: "Tendril Spire"
    prompt: |
      Single tall organic tendril rising from ground, tabletop wargaming terrain, 28mm scale.
      Branching at top, sticky droplets on tips, swaying posture.
      Dark purple with bioluminescent green tips. Sci-fi horror alien.
      CRITICAL: NO base, NO ground plane. White background. Height approx 4 inches.

  - key: "spore_cluster"
    name: "Spore Cluster Tree"
    prompt: |
      Cluster of tall spore-bearing organic stalks, tabletop wargaming terrain, 28mm scale.
      Multiple thin stalks with bulbous spore pods at top, releasing particles.
      Bone white stalks, toxic green spore pods. Sci-fi horror bioorganic.
      CRITICAL: NO base, NO ground plane. White background. Height approx 3 inches.

# =============================================================================
# CONTAINERS
# =============================================================================

containers:
  - key: "egg_cluster"
    name: "Alien Egg Cluster"
    prompt: |
      Cluster of large alien eggs in organic cradle, 28mm scale.
      Some translucent showing shapes inside, mucous strands connecting them.
      Dark purple cradle, pale ivory eggs, green bioluminescent veins.
      CRITICAL: NO base, NO ground plane. White background.

  - key: "resin_cocoons"
    name: "Resin Cocoons"
    prompt: |
      Row of upright resin cocoons attached to organic wall fragment, 28mm scale.
      Humanoid shapes visible through translucent shells, sticky strands.
      Dark purple resin, bone white membrane. Sci-fi horror.
      CRITICAL: NO base, NO ground plane. White background.

  - key: "biomass_node"
    name: "Biomass Node"
    prompt: |
      Bulbous organic mass with thick tendrils anchoring it to ground, 28mm scale.
      Pulsing bioluminescent core visible through membrane, nutrient tubes.
      Dark purple with toxic green glowing core. Sci-fi horror bioorganic.
      CRITICAL: NO base, NO ground plane. White background.
