theme_name: "Urban Modern"
theme_key: "urban_modern"

aesthetic:
  genre: "modern warfare"
  style: "war-torn urban cityscape"
  inspiration:
    - "Modern urban combat zones"
    - "Mogadishu Black Hawk Down"
    - "Syrian civil war urban ruins"
  explicitly_avoid:
    - "Fantasy or sci-fi elements"
    - "Alien technology"
    - "Medieval architecture"

colors:
  primary: "concrete gray and asphalt black"
  secondary: "brick red and dirty beige"
  accent: "faded signage colors and graffiti"

materials:
  - "poured concrete and cinder block"
  - "red brick and plaster"
  - "broken glass and twisted rebar"
  - "asphalt and cracked tarmac"

# =============================================================================
# BATTLE MAP
# =============================================================================

battle_map:
  prompt: |
    Flat uniform ground surface texture, top-down aerial view for tabletop wargaming battle mat.
    Cracked asphalt and worn concrete surface. War-torn urban street floor.
    Subtle natural variation, consistent concrete gray tone across entire surface.
    NO scattered objects, NO debris, NO rocks, NO vegetation.
    NO miniatures, NO terrain pieces, NO text, NO shadows.
    Surface details must be VERY SMALL and fine-grained, as if viewed from far above.
    Individual features (cracks, pebbles, paint flecks) should be no larger than 1% of the image.
    Flat diffuse lighting, printed gaming mat look.
    Landscape 3:2 aspect ratio (72x48 inches table). Resolution 4096x2732.

# =============================================================================
# BASE PLATES
# =============================================================================

base_plates:
  ruins:
    prompt: |
      Seamless tileable top-down texture, destroyed building floor with
      cracked concrete, exposed rebar, scattered plaster and brick fragments.
      Concrete gray with brick red. 512x512, no shadows, flat lighting.
  forest:
    prompt: |
      Seamless tileable top-down texture, overgrown urban courtyard ground
      with cracked pavement, weeds and grass growing through, fallen leaves.
      Asphalt gray-green with wild vegetation. 512x512, no shadows, flat lighting.
  dangerous:
    prompt: |
      Seamless tileable top-down texture, unstable rubble field with tilted
      concrete slabs, exposed rebar spikes, deep holes between debris.
      Dark concrete gray with dust. 512x512, no shadows, flat lighting.

# =============================================================================
# WALLS
# =============================================================================

walls:
  - key: "brick_wall_3inch"
    name: "Brick Building Wall (3\")"
    length_inches: 3
    height_inches: 3
    variants: 3
    prompt: |
      War-damaged brick wall segment, 3 inches long, 3 inches tall, 28mm scale.
      Red brick with crumbling plaster, bullet impact marks, blown-out section.
      Brick red and dirty beige plaster. Modern urban warfare.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat brick wall surface texture, front view.
      Red brick with crumbling plaster, bullet impact marks, exposed mortar.
      Brick red and dirty beige plaster. Modern urban warfare.
      512x512, flat lighting, no shadows, no perspective, no ground.

  - key: "brick_wall_1inch"
    name: "Brick Building Wall (1\")"
    length_inches: 1
    height_inches: 3
    variants: 3
    prompt: |
      Short war-damaged brick wall segment, 1 inch long, 3 inches tall, 28mm scale.
      Red brick with crumbling plaster, exposed rebar at top.
      Brick red and concrete gray. Modern urban warfare.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat brick wall surface texture, front view.
      Red brick with crumbling plaster, exposed rebar, dust coating.
      Brick red and concrete gray. Modern urban warfare.
      512x512, flat lighting, no shadows, no perspective, no ground.

  - key: "jersey_barrier"
    name: "Jersey Barrier (3\")"
    length_inches: 3
    height_inches: 1.5
    variants: 3
    prompt: |
      Concrete jersey barrier with sandbag reinforcement, 3 inches long, 1.5 inches tall, 28mm scale.
      Bullet impact marks, military spray paint markings, razor wire on top.
      Concrete gray, dirty beige sandbags. Modern urban warfare.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat concrete barrier surface texture, front view.
      Concrete with bullet impact marks, military spray paint markings.
      Concrete gray, dirty beige patches. Modern urban warfare.
      512x512, flat lighting, no shadows, no perspective, no ground.

# =============================================================================
# TREES
# =============================================================================

trees:
  - key: "war_damaged_oak"
    name: "War-Damaged Oak"
    prompt: |
      Single war-damaged deciduous tree, tabletop wargaming terrain, 28mm scale.
      Shrapnel damage on trunk, broken branches, sparse leaves remaining.
      Dark brown bark, tattered green-brown foliage. Modern urban warfare.
      CRITICAL: NO base, NO ground plane. White background. Height approx 4 inches.

  - key: "overgrown_lamppost"
    name: "Overgrown Lamp Post"
    prompt: |
      Single bent street lamp post with vines growing up it, 28mm scale.
      Cracked glass light fixture, urban ivy and weeds climbing shaft.
      Black iron post, green vegetation. War-torn urban environment.
      CRITICAL: NO base, NO ground plane. White background. Height approx 3.5 inches.

  - key: "urban_bush"
    name: "Overgrown Urban Bush"
    prompt: |
      Large overgrown bush growing wild in urban ruin, 28mm scale.
      Dense foliage spreading over cracked concrete, thorny branches.
      Deep green with brown dead branches. War-torn city park.
      CRITICAL: NO base, NO ground plane. White background. Height approx 2 inches.

# =============================================================================
# CONTAINERS
# =============================================================================

containers:
  - key: "shipping_container"
    name: "Military Shipping Container"
    prompt: |
      Military shipping container with firing ports cut in sides, 28mm scale.
      Doors welded shut, camouflage netting draped over top, sandbags at base.
      Olive drab green, military markings. Modern urban warfare.
      CRITICAL: NO base, NO ground plane. White background.

  - key: "dumpster_barricade"
    name: "Dumpster Barricade"
    prompt: |
      Overturned commercial dumpster used as cover, 28mm scale.
      Bullet holes in metal sides, sandbags stacked behind, graffiti visible.
      Dark green metal, faded signage colors. Modern urban warfare.
      CRITICAL: NO base, NO ground plane. White background.

  - key: "burned_car"
    name: "Burned-Out Car"
    prompt: |
      Burned-out civilian car wreck, 28mm scale tabletop wargaming terrain.
      Fire-blackened shell, windows blown out, tires melted, doors ajar.
      Charred black metal, rust orange. Modern urban warfare.
      CRITICAL: NO base, NO ground plane. White background.
