theme_name: "Fantasy Medieval"
theme_key: "fantasy_medieval"

aesthetic:
  genre: "dark fantasy"
  style: "medieval ruined"
  inspiration:
    - "Dark Souls architecture"
    - "Lord of the Rings fortifications"
    - "Medieval European castle ruins"
  explicitly_avoid:
    - "Modern materials or technology"
    - "Bright cartoon colors"
    - "Copyrighted character designs"

colors:
  primary: "weathered gray stone"
  secondary: "dark aged wood and iron"
  accent: "faded heraldic red and gold"

materials:
  - "rough-hewn stone blocks"
  - "aged timber beams"
  - "wrought iron reinforcements"
  - "crumbling mortar and moss"

# =============================================================================
# BATTLE MAP
# =============================================================================

battle_map:
  prompt: |
    Flat uniform ground surface texture, top-down aerial view for tabletop wargaming battle mat.
    Trampled earth and packed dirt with faint cobblestone patches. Medieval battlefield floor.
    Subtle natural variation, consistent gray-brown earth tone across entire surface.
    NO scattered objects, NO debris, NO rocks, NO vegetation.
    NO miniatures, NO terrain pieces, NO text, NO shadows.
    Surface details must be VERY SMALL and fine-grained, as if viewed from far above.
    Individual features (cracks, pebbles, grass blades) should be no larger than 1% of the image.
    Flat diffuse lighting, printed gaming mat look.
    Landscape 3:2 aspect ratio (72x48 inches table). Resolution 4096x2732.

# =============================================================================
# BASE PLATES
# =============================================================================

base_plates:
  ruins:
    prompt: |
      Seamless tileable top-down texture, crumbling stone floor with scattered
      rubble and broken mortar. Rough-hewn stone blocks, moss in cracks.
      Weathered gray stone tones. 512x512, no shadows, flat lighting.
  forest:
    prompt: |
      Seamless tileable top-down texture, forest floor with fallen leaves,
      exposed tree roots, ferns, and thick moss. Rich earthy brown-green tones.
      512x512, no shadows, flat lighting.
  dangerous:
    prompt: |
      Seamless tileable top-down texture, dark swamp ground with murky water
      patches, rotting vegetation, and cracked dried mud. Dark brown-green.
      512x512, no shadows, flat lighting.

# =============================================================================
# WALLS
# =============================================================================

walls:
  - key: "stone_wall_3inch"
    name: "Stone Castle Wall (3\")"
    length_inches: 3
    height_inches: 3
    variants: 3
    prompt: |
      Ruined stone castle wall segment, 3 inches long, 3 inches tall, 28mm scale.
      Rough-hewn stone blocks with crumbling mortar, moss growth, arrow slit.
      Weathered gray stone. Dark fantasy medieval.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat stone wall surface texture, front view.
      Rough-hewn stone blocks with crumbling mortar and moss in cracks.
      Weathered gray stone. Dark fantasy medieval.
      512x512, flat lighting, no shadows, no perspective, no ground.

  - key: "stone_wall_1inch"
    name: "Stone Castle Wall (1\")"
    length_inches: 1
    height_inches: 3
    variants: 3
    prompt: |
      Short ruined stone wall segment, 1 inch long, 3 inches tall, 28mm scale.
      Rough-hewn stone blocks, crumbling mortar, ivy growing through cracks.
      Weathered gray stone. Dark fantasy medieval.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat stone wall surface texture, front view.
      Rough-hewn stone blocks, crumbling mortar, ivy growing through cracks.
      Weathered gray stone. Dark fantasy medieval.
      512x512, flat lighting, no shadows, no perspective, no ground.

  - key: "wooden_palisade"
    name: "Wooden Palisade (3\")"
    length_inches: 3
    height_inches: 2
    variants: 3
    prompt: |
      Medieval wooden palisade fence, 3 inches long, 2 inches tall, 28mm scale.
      Aged timber stakes sharpened at top, rope bindings, some stakes broken.
      Dark aged wood with iron reinforcements. Dark fantasy.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat wooden palisade surface texture, front view.
      Aged timber stakes sharpened at top, rope bindings, weathered wood grain.
      Dark aged wood with iron reinforcements. Dark fantasy medieval.
      512x512, flat lighting, no shadows, no perspective, no ground.

# =============================================================================
# TREES
# =============================================================================

trees:
  - key: "ancient_oak"
    name: "Ancient Oak Tree"
    prompt: |
      Single massive ancient oak tree, tabletop wargaming terrain, 28mm scale.
      Thick gnarled trunk, heavy canopy, exposed root systems, moss and ivy.
      Dark brown bark, deep green foliage. Dark fantasy medieval.
      CRITICAL: NO base, NO ground plane. White background. Height approx 4 inches.

  - key: "silver_birch"
    name: "Silver Birch"
    prompt: |
      Single silver birch tree, tabletop wargaming terrain, 28mm scale.
      Pale bark with dark markings, delicate branches, autumn-colored leaves.
      White-silver trunk, golden-red foliage. Dark fantasy forest.
      CRITICAL: NO base, NO ground plane. White background. Height approx 3.5 inches.

  - key: "twisted_willow"
    name: "Twisted Willow"
    prompt: |
      Single twisted willow tree, tabletop wargaming terrain, 28mm scale.
      Gnarled trunk leaning to one side, hanging branches with sparse leaves.
      Dark gray-green wood, ethereal hanging fronds. Dark fantasy mystical.
      CRITICAL: NO base, NO ground plane. White background. Height approx 3 inches.

  - key: "dead_elm"
    name: "Dead Elm"
    prompt: |
      Single dead elm tree, tabletop wargaming terrain, 28mm scale.
      Bare twisted branches reaching upward, bark peeling, hollow trunk.
      Dark brown-black wood, no foliage. Dark fantasy cursed forest.
      CRITICAL: NO base, NO ground plane. White background. Height approx 4 inches.

# =============================================================================
# CONTAINERS
# =============================================================================

containers:
  - key: "supply_wagon"
    name: "Overturned Supply Wagon"
    prompt: |
      Overturned wooden supply wagon, 28mm scale tabletop wargaming terrain.
      One wheel broken, barrels and sacks spilling out, canvas cover half torn.
      Dark aged wood, iron reinforcements. Dark fantasy medieval.
      CRITICAL: NO base, NO ground plane. White background.

  - key: "market_stall"
    name: "Ruined Market Stall"
    prompt: |
      Abandoned market stall, 28mm scale tabletop wargaming terrain.
      Wooden frame with torn canvas awning, overturned barrels and crates.
      Dark aged timber, faded heraldic red fabric. Dark fantasy medieval.
      CRITICAL: NO base, NO ground plane. White background.

  - key: "stone_sarcophagus"
    name: "Stone Sarcophagus"
    prompt: |
      Ancient stone sarcophagus with cracked lid slightly ajar, 28mm scale.
      Carved stone with weathered heraldic symbols, moss growth.
      Weathered gray stone with gold leaf remnants. Dark fantasy medieval.
      CRITICAL: NO base, NO ground plane. White background.
