theme_name: "Frozen Tundra"
theme_key: "frozen_tundra"

aesthetic:
  genre: "arctic warfare"
  style: "frozen military outpost"
  inspiration:
    - "The Thing research station"
    - "Hoth ice planet"
    - "Arctic military installations"
  explicitly_avoid:
    - "Tropical or warm elements"
    - "Bright warm colors"
    - "Lush vegetation"

colors:
  primary: "ice blue and frost white"
  secondary: "dark slate gray and frozen steel"
  accent: "emergency orange and frozen blood red"

materials:
  - "thick ice formations and packed snow"
  - "frozen steel and frost-coated metal"
  - "permafrost-cracked concrete"
  - "ice-encrusted wood and rope"

# =============================================================================
# BATTLE MAP
# =============================================================================

battle_map:
  prompt: |
    Flat uniform ground surface texture, top-down aerial view for tabletop wargaming battle mat.
    Packed snow with faint frost crystal patterns. Frozen tundra floor.
    Subtle natural variation, consistent frost white tone across entire surface.
    NO scattered objects, NO debris, NO rocks, NO vegetation.
    NO miniatures, NO terrain pieces, NO text, NO shadows.
    Surface details must be VERY SMALL and fine-grained, as if viewed from far above.
    Individual features (frost crystals, ice cracks, snow patches) should be no larger than 1% of the image.
    Flat diffuse lighting, printed gaming mat look.
    Landscape 3:2 aspect ratio (72x48 inches table). Resolution 4096x2732.

# =============================================================================
# BASE PLATES
# =============================================================================

base_plates:
  ruins:
    prompt: |
      Seamless tileable top-down texture, permafrost-cracked concrete floor
      with ice formations and frost patterns. Frozen rubble, icicle fragments.
      Ice blue and dark slate gray. 512x512, no shadows, flat lighting.
  forest:
    prompt: |
      Seamless tileable top-down texture, snow-covered forest floor with
      pine needles poking through, frozen root patterns, ice crystals.
      Frost white with dark green-gray undertones. 512x512, no shadows, flat lighting.
  dangerous:
    prompt: |
      Seamless tileable top-down texture, thin cracking ice over dark water
      with pressure ridges, fracture lines, frozen bubbles trapped in ice.
      Translucent ice blue over dark black water. 512x512, no shadows, flat lighting.

# =============================================================================
# WALLS
# =============================================================================

walls:
  - key: "frozen_concrete_wall_3inch"
    name: "Frozen Concrete Wall (3\")"
    length_inches: 3
    height_inches: 3
    variants: 3
    prompt: |
      Frozen concrete wall segment, 3 inches long, 3 inches tall, 28mm scale.
      Permafrost-cracked concrete with icicles hanging, frost coating everything.
      Dark slate gray with ice blue frost. Arctic warfare military.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat concrete wall surface texture, front view.
      Permafrost-cracked concrete with icicles, frost coating and ice crystals.
      Dark slate gray with ice blue frost. Arctic warfare.
      512x512, flat lighting, no shadows, no perspective, no ground.

  - key: "frozen_concrete_wall_1inch"
    name: "Frozen Concrete Wall (1\")"
    length_inches: 1
    height_inches: 3
    variants: 3
    prompt: |
      Short frozen concrete wall segment, 1 inch long, 3 inches tall, 28mm scale.
      Permafrost-cracked concrete with heavy frost coating, ice crystals.
      Dark slate gray with ice blue. Arctic warfare.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat concrete wall surface texture, front view.
      Permafrost-cracked concrete with heavy frost coating, ice crystals.
      Dark slate gray with ice blue. Arctic warfare.
      512x512, flat lighting, no shadows, no perspective, no ground.

  - key: "ice_wall"
    name: "Ice Formation Wall (3\")"
    length_inches: 3
    height_inches: 2.5
    variants: 3
    prompt: |
      Natural ice wall formation, 3 inches long, 2.5 inches tall, 28mm scale.
      Thick translucent ice with crystalline structures, frozen stalactites.
      Ice blue, frost white, translucent. Arctic frozen landscape.
      CRITICAL: NO base, NO pedestal, NO ground plane. White background.
      Side view, straight-on.
    texture_prompt: |
      Seamless tileable flat ice wall surface texture, front view.
      Thick translucent ice with crystalline structures and frozen patterns.
      Ice blue, frost white, translucent. Arctic frozen landscape.
      512x512, flat lighting, no shadows, no perspective, no ground.

# =============================================================================
# TREES
# =============================================================================

trees:
  - key: "frost_pine"
    name: "Snow-Laden Pine"
    prompt: |
      Single snow-laden pine tree, tabletop wargaming terrain, 28mm scale.
      Heavy branches drooping with ice, thick trunk with frost patterns.
      Dark green needles under frost white snow load. Arctic warfare.
      CRITICAL: NO base, NO ground plane. White background. Height approx 4 inches.

  - key: "ice_pillar"
    name: "Ice Pillar"
    prompt: |
      Single tall natural ice pillar formation, tabletop wargaming terrain, 28mm scale.
      Crystalline blue ice, light refracting through translucent surface.
      Ice blue and frost white, frozen stalagmite shape. Arctic frozen.
      CRITICAL: NO base, NO ground plane. White background. Height approx 3.5 inches.

  - key: "dead_birch"
    name: "Frozen Dead Birch"
    prompt: |
      Single dead birch tree encrusted in ice, tabletop wargaming terrain, 28mm scale.
      Bare white branches coated in thick ice, snapped limbs from ice weight.
      Frost white bark, ice blue coating. Arctic tundra.
      CRITICAL: NO base, NO ground plane. White background. Height approx 3 inches.

# =============================================================================
# CONTAINERS
# =============================================================================

containers:
  - key: "supply_bunker"
    name: "Frozen Supply Bunker"
    prompt: |
      Half-buried concrete supply bunker with blast door frozen open, 28mm scale.
      Crates and barrels visible inside, ventilation pipes protruding from snow.
      Frost-coated dark slate gray, ice on every surface. Arctic military.
      CRITICAL: NO base, NO ground plane. White background.

  - key: "fuel_drums"
    name: "Frozen Fuel Drum Stack"
    prompt: |
      Stack of frost-covered fuel drums on wooden palette, 28mm scale.
      Some drums burst from freezing, frozen fuel puddle, snow-covered tarp.
      Dark steel with ice blue frost coating, emergency orange markings.
      CRITICAL: NO base, NO ground plane. White background.

  - key: "cargo_sled"
    name: "Abandoned Cargo Sled"
    prompt: |
      Abandoned heavy cargo sled with metal runners, 28mm scale.
      Frozen cargo nets over crates, one runner broken, snow drifting over.
      Frozen steel runners, ice-encrusted wood frame. Arctic warfare.
      CRITICAL: NO base, NO ground plane. White background.
